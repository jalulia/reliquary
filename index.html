<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HOLY OPS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0A0A0A;--cinnabar:#FF4500;--cinnabar-dim:rgba(255,69,0,.15);
  --w95:rgba(255,255,255,.92);--w80:rgba(255,255,255,.78);--w60:rgba(255,255,255,.58);
  --w40:rgba(255,255,255,.38);--w20:rgba(255,255,255,.18);--w10:rgba(255,255,255,.08);
  --w05:rgba(255,255,255,.04);--w02:rgba(255,255,255,.02);
  --saint-color:#FF4500;--glow-intensity:0;--completion-color:var(--saint-color);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--w60);
cursor:default;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;
touch-action:none;font-family:'IBM Plex Mono',monospace;font-weight:300;font-size:14px}
#landing{position:fixed;inset:0;z-index:1000;background:var(--bg);
display:flex;flex-direction:column;align-items:center;justify-content:center;
transition:opacity 1s ease,visibility 1s ease}
#landing.hidden{opacity:0;visibility:hidden;pointer-events:none}
#landing-halo{position:absolute;width:clamp(360px,55vw,700px);height:clamp(360px,55vw,700px);
top:50%;left:50%;margin-top:calc(clamp(360px,55vw,700px) / -2);margin-left:calc(clamp(360px,55vw,700px) / -2);
pointer-events:none;animation:haloSpin 90s linear infinite}
#landing-halo svg{width:100%;height:100%;overflow:visible}
.halo-ray{stroke:rgba(255,255,255,.04);stroke-width:.3;fill:none;transform-origin:center}
.halo-ray-fine{stroke:rgba(255,255,255,.025);stroke-width:.15;fill:none}
.halo-star{fill:rgba(255,255,255,.12);animation:starGlint 4s ease-in-out infinite}
.halo-star:nth-child(odd){animation-delay:-2s;animation-duration:3.5s}
.halo-star:nth-child(3n){animation-delay:-1.2s;animation-duration:5s}
@keyframes haloSpin{to{transform:rotate(360deg)}}
@keyframes starGlint{0%,100%{opacity:.06;transform:scale(.6)}50%{opacity:.3;transform:scale(1.2)}}
#landing h1{font-family:'Pirata One',cursive;font-size:clamp(3.5rem,9vw,7rem);
color:var(--w95);letter-spacing:.08em;margin-bottom:.15em;position:relative;z-index:2;
text-shadow:0 0 80px rgba(255,69,0,.25),0 0 160px rgba(255,69,0,.08)}
#landing .sub{font-family:'Instrument Serif',serif;font-style:italic;
font-size:clamp(1rem,2.2vw,1.5rem);color:var(--w40);letter-spacing:.12em;margin-bottom:3.5em}
#begin-btn{position:relative;background:transparent;border:none;cursor:pointer;
padding:0;width:240px;height:88px;display:flex;align-items:center;justify-content:center;
transition:all .6s ease;filter:drop-shadow(0 0 12px rgba(255,69,0,.08))}
#begin-btn .btn-frame{position:absolute;inset:0;pointer-events:none}
#begin-btn .btn-frame svg{width:100%;height:100%}
#begin-btn .btn-text{font-family:'IBM Plex Mono',monospace;font-weight:400;font-size:.6rem;
letter-spacing:.4em;text-transform:uppercase;color:var(--w40);position:relative;z-index:2;
transition:all .5s ease}
#begin-btn .btn-outer{animation:btnBreathe 8s ease-in-out infinite}
@keyframes btnBreathe{0%,100%{stroke-opacity:.14}50%{stroke-opacity:.2}}
#begin-btn:hover{filter:drop-shadow(0 0 24px rgba(255,69,0,.2)) drop-shadow(0 0 50px rgba(255,69,0,.08))}
#begin-btn:hover .btn-text{color:var(--w80);letter-spacing:.48em}
#begin-btn:hover .btn-outer{stroke:rgba(255,255,255,.3)}
#begin-btn:hover .btn-inner{stroke:rgba(255,255,255,.18)}
#begin-btn:hover .btn-filigree{opacity:.55}
#begin-btn:hover .btn-gem{opacity:.5;filter:url(#btnGlow)}
#app{display:none;width:100%;height:100%;overflow:hidden}
#app.active{display:flex}
#catalogue{width:340px;min-width:300px;height:100%;border-right:1px solid var(--w10);
display:flex;flex-direction:column;background:linear-gradient(180deg,var(--w02),transparent 40%)}
#cat-header{padding:1.2em 1.6em .6em}
#cat-header h2{font-family:'Pirata One',cursive;font-size:1.15rem;color:var(--w80);letter-spacing:.06em}
#carousel-wrap{position:relative;border-bottom:1px solid var(--w10);flex-shrink:0}
#carousel{display:flex;flex-wrap:wrap;gap:.3em;padding:.5em .8em;justify-content:center}
.saint-chip{padding:.2em .45em;cursor:pointer;border:1px solid transparent;border-radius:3px;
transition:all .3s ease;display:flex;align-items:center;gap:.3em;white-space:nowrap}
.saint-chip .saint-icon{width:14px;height:14px;flex-shrink:0;opacity:.5;transition:opacity .3s}
.saint-chip .saint-icon svg{width:100%;height:100%}
.saint-chip .sname{font-size:.45rem;letter-spacing:.08em;text-transform:uppercase;color:var(--w40);transition:color .3s}
.saint-chip:hover .sname{color:var(--w60)}
.saint-chip.active{border-color:var(--w10);background:var(--w05)}
.saint-chip.active .saint-icon{opacity:1}
.saint-chip.active .sname{color:var(--w80)}
#saint-info{padding:.6em 1.4em;border-bottom:1px solid var(--w10);
display:flex;align-items:baseline;gap:.6em;min-height:2.8em;flex-wrap:wrap}
#saint-name{font-family:'Pirata One',cursive;font-size:1.3rem;
color:var(--saint-color);transition:color .3s;letter-spacing:.04em}
#saint-key{font-size:.55rem;letter-spacing:.12em;color:var(--w40);
border:1px solid var(--w10);padding:.15em .4em;border-radius:2px}
#saint-vibe{font-family:'Instrument Serif',serif;font-style:italic;
font-size:.65rem;color:var(--w20);letter-spacing:.04em;margin-left:auto}
/* Cabinet relic layout — 3×3 grid of arched compartments */
#relic-cabinet-wrap{flex:1;overflow-y:auto;padding:.6em .8em;
scrollbar-width:thin;scrollbar-color:var(--w10) transparent}
#relic-cabinet{display:grid;grid-template-columns:repeat(3,1fr);gap:.6em}
.cabinet-niche{aspect-ratio:.85;border-radius:6px 6px 2px 2px;display:flex;flex-direction:column;
align-items:center;justify-content:flex-end;cursor:grab;position:relative;
border:1px solid var(--w10);background:var(--bg);transition:all .35s ease;overflow:hidden;
clip-path:polygon(0% 18%,8% 6%,20% 1%,50% 0%,80% 1%,92% 6%,100% 18%,100% 100%,0% 100%)}
.cabinet-niche .relic-img{width:72%;height:72%;object-fit:contain;pointer-events:none;
filter:brightness(1.1) contrast(1.05);transition:all .4s ease;position:absolute;top:12%;z-index:0}
.cabinet-niche .rname{font-size:.38rem;letter-spacing:.1em;text-transform:uppercase;color:var(--w60);
text-align:center;line-height:1.1;padding:.15em .3em;position:relative;z-index:2;
background:linear-gradient(transparent,rgba(10,10,10,.92) 30%);width:100%;transition:color .3s;font-weight:400}
.cabinet-niche .rtype{font-size:.26rem;letter-spacing:.06em;text-transform:uppercase;color:var(--w20);
position:absolute;top:.2em;right:.3em;z-index:2;font-weight:500;background:rgba(10,10,10,.6);
padding:.08em .2em;border-radius:2px}
.cabinet-niche:hover{border-color:var(--saint-color);
box-shadow:0 0 20px color-mix(in srgb,var(--saint-color) 18%,transparent),
inset 0 0 16px color-mix(in srgb,var(--saint-color) 6%,transparent)}
.cabinet-niche:hover .relic-img{filter:brightness(1.25) contrast(1.1) saturate(1.15);transform:scale(1.04)}
.cabinet-niche:hover .rname{color:var(--saint-color)}
.cabinet-niche.placed{opacity:.12;border-style:dashed;pointer-events:none;cursor:default;filter:grayscale(.8)}
.cabinet-niche.dragging{transform:scale(1.12);z-index:10}
.relic-cell{aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;
align-items:center;justify-content:flex-end;cursor:grab;position:relative;
border:1px solid var(--w10);background:var(--bg);transition:all .35s ease;overflow:hidden}
.relic-cell .relic-img{width:78%;height:78%;object-fit:contain;pointer-events:none;
filter:brightness(1.1) contrast(1.05);transition:all .4s ease;position:absolute;top:4%;
z-index:0;drop-shadow:0 0 6px rgba(255,255,255,.15)}
.relic-cell .rname{font-size:.42rem;letter-spacing:.12em;text-transform:uppercase;
color:var(--w60);text-align:center;line-height:1.1;padding:.15em .3em;
position:relative;z-index:2;background:linear-gradient(transparent,rgba(10,10,10,.92) 30%);
width:100%;transition:color .3s;font-weight:400}
.relic-cell .rtype{font-size:.28rem;letter-spacing:.08em;text-transform:uppercase;
color:var(--w20);position:absolute;top:.25em;right:.35em;z-index:2;
font-weight:500;background:rgba(10,10,10,.6);padding:.1em .25em;border-radius:2px}
.relic-cell:hover{border-color:var(--saint-color);
box-shadow:0 0 24px color-mix(in srgb,var(--saint-color) 18%,transparent),
inset 0 0 20px color-mix(in srgb,var(--saint-color) 6%,transparent)}
.relic-cell:hover .relic-img{filter:brightness(1.25) contrast(1.1) saturate(1.15);transform:scale(1.04)}
.relic-cell:hover .rname{color:var(--saint-color)}
.relic-cell.placed{opacity:.12;border-style:dashed;pointer-events:none;cursor:default;
filter:grayscale(.8)}
@property --spin{syntax:'<angle>';initial-value:0deg;inherits:false}
.relic-cell::after{content:'';position:absolute;inset:0;border-radius:6px;
background:linear-gradient(145deg,rgba(255,255,255,.03),transparent 40%,transparent 60%,rgba(255,255,255,.02));
pointer-events:none;z-index:1}
.relic-cell::before{content:'';position:absolute;inset:-1px;border-radius:6px;
background:conic-gradient(from var(--spin,0deg),transparent 0%,
color-mix(in srgb,var(--saint-color) 6%,transparent) 25%,transparent 50%,
color-mix(in srgb,var(--saint-color) 4%,transparent) 75%,transparent 100%);
animation:holospin 12s linear infinite;pointer-events:none;opacity:0;z-index:0;
transition:opacity .4s}
.relic-cell:hover::before{opacity:1}
@keyframes holospin{to{--spin:360deg}}
#reliquary-panel{flex:1;height:100%;display:flex;flex-direction:column;
align-items:stretch;justify-content:stretch;position:relative;overflow:hidden}
#reliquary-frame{position:relative;width:100%;flex:1;min-height:0;
display:flex;align-items:center;justify-content:center;padding:0;margin:0}
/* Reliquary-shaped frame — ogival arch top, straight sides, stepped base */
.reliquary-border{position:absolute;inset:0;pointer-events:none;z-index:2;overflow:visible}
.reliquary-border svg{width:100%;height:100%;overflow:visible;display:block}
.reliquary-border .fr-outer{fill:none;stroke:rgba(255,255,255,.14);stroke-width:2;transition:stroke .8s}
.reliquary-border .fr-inner{fill:none;stroke:rgba(255,255,255,.08);stroke-width:1;transition:stroke .8s}
.reliquary-border .fr-detail{fill:none;stroke:rgba(255,255,255,.1);stroke-width:.5;opacity:.6}
.reliquary-border .fr-filigree{fill:none;stroke:rgba(255,255,255,.08);stroke-width:.4;opacity:.45}
.reliquary-border .fr-gem{fill:var(--saint-color);opacity:.12;stroke:rgba(255,255,255,.15);stroke-width:.3;transition:fill .5s,opacity .8s}
.reliquary-border .fr-cross{fill:none;stroke:rgba(255,255,255,.18);stroke-width:1.2}
.gold .reliquary-border .fr-perimeter{stroke:color-mix(in srgb,var(--completion-color) 45%,transparent)}
.gold .reliquary-border .fr-gem{fill:color-mix(in srgb,var(--completion-color) 50%,transparent);opacity:.35}
#body-container{position:absolute;top:14%;left:16%;right:16%;bottom:12%;overflow:visible}
#body-svg{position:absolute;inset:0;width:100%;height:100%;opacity:.62;
transition:opacity 1.2s ease;pointer-events:none}
#body-svg.lit{opacity:.78}
#body-svg path,#body-svg line,#body-svg circle,#body-svg ellipse{fill:none;stroke:var(--w60);stroke-width:0.8}
/* Vestment pattern fills */
#body-svg .vest-outline{stroke:var(--w60);stroke-width:1;fill:none;opacity:.68}
#body-svg .vest-detail{stroke:var(--w40);stroke-width:.5;fill:none;opacity:.54}
#body-svg .vest-pattern{stroke:var(--w20);stroke-width:.35;fill:none;opacity:.40}
#body-svg .vest-orphrey{stroke:var(--w60);stroke-width:.6;fill:none;opacity:.60}
#body-svg .vest-gem{fill:var(--w20);stroke:var(--w40);stroke-width:.3;opacity:.38}
#body-svg .halo-ring{stroke:var(--w60);fill:none;opacity:.54}
#body-svg .zone-label{font-family:'IBM Plex Mono',monospace;font-size:4.5px;fill:var(--w60);letter-spacing:.1em;text-transform:uppercase}
.illum-zone{opacity:0;transition:opacity .8s ease;pointer-events:none}
.illum-zone path,.illum-zone circle,.illum-zone line,.illum-zone ellipse{
fill:none;stroke:var(--saint-color);stroke-width:0.35;opacity:.3}
.illum-zone.active{opacity:1}
.illum-zone.active path,.illum-zone.active circle,.illum-zone.active line,.illum-zone.active ellipse{
animation:illumPulse 6s ease-in-out infinite}
@keyframes illumPulse{0%,100%{opacity:.2}50%{opacity:.4}}
/* Zone hover — vestment ornamentation whispers when relic is dragged near */
.illum-zone.hover{opacity:.22;transition:opacity .2s ease}
.illum-zone.hover path,.illum-zone.hover circle,.illum-zone.hover line,.illum-zone.hover ellipse{
stroke:var(--w40);opacity:.5;animation:illumBreath 1.8s ease-in-out infinite}
@keyframes illumBreath{0%,100%{opacity:.35}50%{opacity:.55}}
/* Per-vibe tracery animations — all subtle, nearly imperceptible */
[data-vibe="punk"] .illum-zone.active path{animation:illumPunk 1.5s ease infinite}
@keyframes illumPunk{0%,100%{opacity:.3}50%{opacity:.15}}
[data-vibe="motorik"] .illum-zone.active path{animation:illumMotorik 4s linear infinite;stroke-dasharray:1 3}
@keyframes illumMotorik{0%{stroke-dashoffset:0}100%{stroke-dashoffset:16}}
[data-vibe="dub"] .illum-zone.active path{animation:illumDub 5s ease-in-out infinite}
@keyframes illumDub{0%,100%{opacity:.15}50%{opacity:.35}}
[data-vibe="disco"] .illum-zone.active path{animation:illumDisco 3s ease-in-out infinite}
@keyframes illumDisco{0%,100%{opacity:.2}50%{opacity:.38}}
[data-vibe="pop"] .illum-zone.active path{animation:illumPop 4s ease infinite}
@keyframes illumPop{0%,100%{opacity:.2}50%{opacity:.35}}
[data-vibe="city"] .illum-zone.active path{animation:illumCity 5s ease-in-out infinite}
@keyframes illumCity{0%,100%{opacity:.18}50%{opacity:.32}}
[data-vibe="funk"] .illum-zone.active path{animation:illumFunk 3s ease infinite}
@keyframes illumFunk{0%,100%{opacity:.2}50%{opacity:.35}}
[data-vibe="exotica"] .illum-zone.active path{animation:illumExotica 6s ease-in-out infinite}
@keyframes illumExotica{0%,100%{opacity:.18}50%{opacity:.32}}
[data-vibe="acid"] .illum-zone.active path{animation:illumAcid 2s ease infinite}
@keyframes illumAcid{0%,100%{opacity:.25}50%{opacity:.38}}
[data-vibe="boom"] .illum-zone.active path{animation:illumBoom 3s ease-in-out infinite}
@keyframes illumBoom{0%,100%{opacity:.2}50%{opacity:.35}}
@keyframes slotBurst{0%{box-shadow:0 0 0 0 var(--saint-color)}100%{box-shadow:0 0 30px 15px transparent}}
.slot.burst{animation:slotBurst .5s ease-out}
@keyframes rejectShake{0%,100%{transform:translate(-50%,-50%)}25%{transform:translate(calc(-50% + 6px),-50%)}75%{transform:translate(calc(-50% - 6px),-50%)}}
.slot.reject{animation:rejectShake .3s ease}
#reliquary-panel::before{content:'';position:absolute;inset:0;
background:radial-gradient(ellipse at 50% 40%,
color-mix(in srgb,var(--saint-color) calc(var(--glow-intensity) * 1%),transparent),transparent 60%);
pointer-events:none;transition:all 1.5s ease;opacity:calc(var(--glow-intensity) * 0.3)}
#noise-overlay{position:absolute;inset:0;pointer-events:none;opacity:.03;mix-blend-mode:overlay}
#body-title{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);
font-family:'Pirata One',cursive;font-size:.7rem;color:var(--w20);
letter-spacing:.2em;text-transform:uppercase;transition:color .5s}
#body-title.gold{color:color-mix(in srgb,var(--completion-color) 60%,transparent)}
#idle-msg{position:absolute;bottom:110px;left:50%;transform:translateX(-50%);
font-family:'Instrument Serif',serif;font-style:italic;font-size:.7rem;
color:var(--w20);letter-spacing:.05em;white-space:nowrap;opacity:0;
transition:opacity .8s ease;pointer-events:none}
#idle-msg.visible{opacity:1}
#slot-grid{position:absolute;inset:0;pointer-events:none}
/* ── SLOTS: invisible hit areas, no borders ── */
.slot{position:absolute;transform:translate(-50%,-50%);width:72px;height:72px;border-radius:50%;
border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;
transition:all .4s ease;pointer-events:all;background:transparent;cursor:crosshair}
.slot::before{content:attr(data-label);position:absolute;bottom:-1.5em;
font-size:.30rem;letter-spacing:.16em;text-transform:uppercase;
color:rgba(255,255,255,.10);white-space:nowrap;transition:color .5s;pointer-events:none}
.slot .slot-icon{display:none}
.slot .slot-name{position:absolute;bottom:-2.6em;font-size:.28rem;letter-spacing:.12em;
text-transform:uppercase;color:rgba(255,255,255,.32);white-space:nowrap;text-align:center;
pointer-events:none;opacity:0;transition:opacity .4s}
.slot .slot-relic-img{width:92%;height:92%;object-fit:contain;position:absolute;
pointer-events:none;
filter:brightness(1.1) contrast(1.05);
transition:opacity .5s ease,filter .3s ease;opacity:0;top:3px}
/* Filled: image floats directly on body, no container */
.slot.filled{background:transparent;cursor:grab}
.slot.removing .slot-relic-img{opacity:0 !important;transform:scale(0.7);transition:all .3s ease !important;animation:none !important}
.slot.removing .slot-name{opacity:0 !important;transition:opacity .3s ease !important}
.slot.filled .slot-relic-img{opacity:1;animation:relicFloat 4s ease-in-out infinite}
.slot.filled .slot-name{opacity:1}
.slot.filled::before{color:rgba(255,255,255,.2)}
/* Dragover: no border — just a subtle radial blush beneath cursor */
.slot.dragover{background:radial-gradient(circle,
color-mix(in srgb,var(--slot-color,white) 9%,transparent) 40%,transparent 75%)}
.slot.dragover::before{color:rgba(255,255,255,.3)}
/* Beat hit: subtle brightness micro-pulse */
.slot.beat-hit .slot-relic-img{
filter:brightness(1.18) contrast(1.08) !important;
animation:relicPulse .18s ease-out,relicFloat 4s ease-in-out .18s infinite !important}
@keyframes relicFloat{0%,100%{transform:scale(1) translateY(0)}50%{transform:scale(1.032) translateY(-1px)}}
@keyframes relicPulse{0%{transform:scale(1)}35%{transform:scale(1.03)}100%{transform:scale(1)}}
.body-limb{transform-origin:center;transition:transform .05s ease-out}
.illum-zone.drag-near:not(.active){opacity:0.14;transition:opacity .25s ease !important}
.illum-zone.drag-near:not(.active) path,.illum-zone.drag-near:not(.active) circle,
.illum-zone.drag-near:not(.active) line,.illum-zone.drag-near:not(.active) ellipse{opacity:.35;stroke-width:0.5}
.gold-stroke{stroke:color-mix(in srgb,var(--completion-color) 60%,transparent) !important;transition:stroke 1s}
.gold-flash{animation:goldFlash 1s ease-out}
@keyframes goldFlash{0%{filter:brightness(3)}100%{filter:brightness(1)}}
#authenticum{position:absolute;right:0;bottom:0;width:280px;min-width:240px;
max-height:36px;overflow:hidden;border-left:1px solid var(--w10);border-top:1px solid var(--w10);z-index:4;
display:flex;flex-direction:column;background:rgba(10,10,10,.95);
transition:max-height .4s ease,border-radius .3s;border-radius:6px 0 0 0;cursor:pointer}
#authenticum:hover,#authenticum.open{max-height:50vh;overflow-y:auto;border-radius:0;cursor:default}
#auth-header{padding:.6em 1em .4em;display:flex;align-items:center;justify-content:space-between}
#auth-header::after{content:'▲';font-size:.5rem;color:var(--w30);transition:transform .3s}
#authenticum:hover #auth-header::after,#authenticum.open #auth-header::after{transform:rotate(180deg)}
#auth-header{padding:1.6em 1.4em .8em}
#auth-header h2{font-family:'Pirata One',cursive;font-size:1rem;color:var(--w80);letter-spacing:.06em}
#auth-header .asub{font-size:.5rem;color:var(--w20);letter-spacing:.18em;text-transform:uppercase;display:block;margin-top:.3em}
#auth-list{flex:1;overflow-y:auto;padding:.8em 1.4em;scrollbar-width:thin;scrollbar-color:var(--w10) transparent}
.auth-entry{padding:.55em 0;border-bottom:1px solid var(--w05);display:flex;align-items:baseline;gap:.5em;animation:fadeSlideIn .3s ease both}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.auth-num{font-size:.5rem;color:rgba(255,255,255,.12);min-width:1.4em;font-weight:500}
.auth-relic{font-size:.6rem;letter-spacing:.05em}
.auth-saint{font-family:'Instrument Serif',serif;font-style:italic;font-size:.55rem;color:rgba(255,255,255,.28);margin-left:auto;white-space:nowrap}
#seal-area{padding:1.4em;border-top:1px solid var(--w10);display:flex;flex-direction:column;align-items:center;gap:.5em}
#wax-seal{width:44px;height:44px;border-radius:50%;border:1px solid var(--w10);
display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .6s ease;cursor:default;opacity:.3}
#wax-seal.ready{opacity:.8;cursor:pointer;border-color:var(--cinnabar);box-shadow:0 0 25px rgba(255,69,0,.15)}
#wax-seal.stamped{opacity:1;background:var(--cinnabar);border-color:color-mix(in srgb,var(--completion-color) 60%,transparent);box-shadow:0 0 35px rgba(255,69,0,.3),0 0 12px color-mix(in srgb,var(--completion-color) 15%,transparent)}
#seal-label{font-size:.42rem;letter-spacing:.18em;text-transform:uppercase;color:var(--w20)}
#cert-text{font-family:'Instrument Serif',serif;font-style:italic;font-size:.55rem;color:var(--w20);text-align:center;line-height:1.6;padding:0 .4em}
/* Votive tray — structured row at bottom of reliquary, inside the frame */
#votive-tray{display:flex;justify-content:space-evenly;align-items:flex-end;
width:100%;padding:0.3em 1em;gap:0;position:absolute;bottom:0;left:0;z-index:5;
background:linear-gradient(to top,rgba(10,10,10,.9) 0%,transparent 100%)}
.votive{display:flex;flex-direction:column;align-items:center;gap:.1em;
cursor:pointer;padding:.25em .15em;border:none;
transition:all .4s ease;opacity:.35;flex:1;max-width:56px}
.votive-icon{width:32px;height:32px;fill:none;stroke:rgba(218,165,32,.45);stroke-width:.8;
stroke-linecap:round;stroke-linejoin:round;transition:all .4s ease}
.votive-name{font-size:.18rem;letter-spacing:.12em;text-transform:uppercase;
color:rgba(218,165,32,.25);transition:color .4s;white-space:nowrap}
.votive:hover{opacity:.6}
.votive:hover .votive-icon{stroke:rgba(218,165,32,.7)}
.votive:hover .votive-name{color:rgba(218,165,32,.5)}
.votive.active{opacity:1}
.votive.active .votive-icon{stroke:rgba(218,165,32,.95);filter:drop-shadow(0 0 5px rgba(218,165,32,.4))}
.votive.active .votive-name{color:rgba(218,165,32,.75)}
@keyframes votivePulse{0%,100%{opacity:.9}50%{opacity:1}}
#locus-label{position:absolute;bottom:1%;left:50%;transform:translateX(-50%);
font-family:'Instrument Serif',serif;font-style:italic;font-size:.45rem;
color:rgba(218,165,32,0);letter-spacing:.1em;text-align:center;transition:color 2s ease;
white-space:nowrap;z-index:5}
#locus-label.revealed{color:rgba(218,165,32,.55)}
#drag-ghost{position:fixed;pointer-events:none;z-index:9999;width:56px;height:56px;
border-radius:8px;display:none;align-items:center;justify-content:center;
border:none;opacity:0;transition:opacity .15s;background:transparent;overflow:hidden}
#drag-ghost.active{display:flex;opacity:.9}
#visualizer{position:absolute;bottom:0;left:0;right:0;height:60px;pointer-events:none;opacity:.25}
@media(max-width:960px){#authenticum{display:none}}
@media(max-width:640px){
/* ═══ MOBILE: fixed 100vh, no page scroll ═══ */
#app.active{flex-direction:column;overflow:hidden;height:100vh;height:100dvh}

/* ── Catalogue: compact strip at top ── */
#catalogue{width:100%;height:auto;border-right:none;border-bottom:1px solid var(--w10);
flex-shrink:0;overflow:hidden;touch-action:none}
#cat-header{padding:.4em .6em .2em}
#cat-header h2{font-size:.8rem}
#carousel-wrap{padding:0}
#carousel{gap:.15em;padding:.25em .4em}
.saint-chip{padding:.12em .3em;font-size:.45rem}
.saint-chip .saint-icon{width:10px;height:10px}
#saint-info{padding:.2em .6em;min-height:1.6em}
#saint-name{font-size:.9rem}
#saint-key{font-size:.45rem;padding:.08em .3em}
#saint-vibe{font-size:.55rem}
#relic-cabinet-wrap{padding:.2em .3em;overflow-y:auto;-webkit-overflow-scrolling:touch}
#relic-cabinet{grid-template-columns:repeat(3,1fr);gap:.2em}
.cabinet-niche{aspect-ratio:1;border-radius:2px;max-width:72px;margin:0 auto}
.cabinet-niche .relic-img{width:60%;height:60%}
.cabinet-niche .relic-label{font-size:.25rem;letter-spacing:.04em}

/* ── Reliquary: fills remaining height, NO scroll ── */
#reliquary-panel{flex:1;min-height:0;overflow:hidden}
#reliquary-frame{height:100%;min-height:0}
.reliquary-border svg{height:100%}

/* ── Slots: smaller for mobile ── */
.slot{width:36px;height:36px}
.slot-label{font-size:.24rem}
.slot-relic-img{width:92%;height:92%}

/* ── Drag ghost: smaller on mobile ── */
#drag-ghost{width:36px;height:36px}

/* ── Saint SVG ── */
#body-svg{max-width:60%;margin:0 auto}

/* ── Votives: tiny row below frame, not overlapping saint ── */
.votive{position:static;transform:none;display:inline-flex;padding:.15em}
.votive:hover{transform:scale(1.05)}
.votive.active{animation:none}
.votive-icon{width:18px;height:18px}
.votive-name{font-size:.15rem}
#votive-tray{padding:0 .3em;gap:0}
#locus-label{position:static;transform:none;margin-top:.2em;font-size:.5rem}
#idle-msg{font-size:.5rem}
#body-title{font-size:.45rem}
#authenticum{display:none}
}

}

function buildConvolver(c){
  const len=c.sampleRate*4,buf=c.createBuffer(2,len,c.sampleRate);
  for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.5);}
  AC.convolver=c.createConvolver();AC.convolver.buffer=buf;
}

function buildCathedralConvolver(c){
  const sr=c.sampleRate,dur=8,len=sr*dur;
  const buf=c.createBuffer(2,len,sr);
  const pd=Math.floor(sr*0.025); // 25ms pre-delay
  for(let ch=0;ch<2;ch++){
    const d=buf.getChannelData(ch);
    let prev=0;
    for(let i=0;i<pd;i++)d[i]=0;
    for(let i=pd;i<len;i++){
      const pos=(i-pd)/(len-pd);
      const white=Math.random()*2-1;
      // Frequency-dependent decay: bass sustains, highs die fast
      const alpha=0.12;
      prev=prev*(1-alpha)+white*alpha;
      const lo=prev*Math.pow(1-pos,0.55)*0.65; // sub/bass: ~5s RT60
      const hi=(white-prev)*Math.pow(1-pos,2.8)*0.45; // highs: ~1.5s RT60
      const mid=white*Math.pow(1-pos,1.1)*0.4; // mids: ~3s RT60
      d[i]=(lo+mid+hi)*(1+ch*0.08*(Math.random()-0.5)); // slight stereo decorrelation
    }
  }
  const conv=c.createConvolver();conv.buffer=buf;return conv;
}

function updateJosephGravity(t){
  const jCount=Object.values(VOICES).filter(v=>v.saint.id==='joseph').length;
  if(jCount===0)return;
  const ratio=Math.max(2.0-jCount*0.25,1.2);
  AC.comp.ratio.setTargetAtTime(ratio,t,0.3);
  AC.masterLPF.frequency.setTargetAtTime(Math.min(18000+jCount*1500,20000),t,0.3);
}

function updateDensity(){
  const n=Object.keys(VOICES).length;if(!AC.ctx)return;const t=AC.ctx.currentTime+0.05;
  // Density should build energy, not crush it. Gentle compression increase,
  // slight LPF warmth, but gain stays strong. More relics = fuller, not quieter.
  AC.comp.ratio.setTargetAtTime(Math.min(2+(n/9)*1.2,3.2),t,0.1);
  AC.reverbWet.gain.setTargetAtTime(Math.min(0.25+(n/9)*0.2,0.45),t,0.1);
  AC.masterLPF.frequency.setTargetAtTime(Math.max(18000-(n/9)*3000,15000),t,0.1);
  AC.master.gain.setTargetAtTime(Math.max(0.72-(n/9)*0.08,0.64),t,0.1);
  document.documentElement.style.setProperty('--glow-intensity',Math.min(n/9,1));
  updateJosephGravity(t);
  if(ROOM.masterGain)ROOM.masterGain.gain.setTargetAtTime(Math.max(1.0-n*0.012,0.88),t,0.5);
  applyModifiers();
  // Dominant-saint ducking: the saint with the most relics plays at full volume,
  // minority saints duck to 40% to avoid cross-key mud
  const saintCounts={};
  Object.values(VOICES).forEach(v=>{saintCounts[v.saint.id]=(saintCounts[v.saint.id]||0)+1;});
  const maxCount=Math.max(...Object.values(saintCounts),0);
  if(maxCount>0){
    Object.values(VOICES).forEach(v=>{
      const count=saintCounts[v.saint.id]||0;
      const targetGain=count===maxCount?0.7:0.7*0.4;// minority saints duck to 40%
      v.output.gain.setTargetAtTime(targetGain,t,0.3);
    });
  }
}

// ══════ MODIFIER REGISTRY ══════
const MODIFIERS={
  pellis:{apply(t){AC.reverbWet.gain.setTargetAtTime(0.01,t,0.1);},remove(t){/* restored by updateDensity */}},
  via:{apply(t){AC.reverbWet.gain.setTargetAtTime(0.68,t,0.2);},remove(t){}},
  nimbvs:{apply(t){AC.comp.ratio.setTargetAtTime(1.3,t,0.2);AC.masterLPF.frequency.setTargetAtTime(20000,t,0.3);},remove(t){}},
  stultitia:{apply(t){SWING.active=true;SWING.amount=0.52;},remove(t){SWING.active=false;SWING.amount=0;}},
  febris:{apply(t){
    if(!AC._febrisId){let q=1;AC._febrisId=setInterval(()=>{if(!AC.ctx)return;q=Math.min(q+0.08,7);AC.sharedFilter.Q.setTargetAtTime(q,AC.ctx.currentTime,0.3);},500);}
  },remove(t){clearInterval(AC._febrisId);AC._febrisId=null;AC.sharedFilter.Q.setTargetAtTime(0.7,t,0.5);}},
  porcvs:{apply(t){
    if(!AC._porcvs&&AC.ctx){const lfo=AC.ctx.createOscillator();lfo.type='sine';lfo.frequency.value=0.8;const g=AC.ctx.createGain();g.gain.value=2000;lfo.connect(g);g.connect(AC.sharedFilter.frequency);lfo.start();AC._porcvs={lfo,g};}
  },remove(t){if(AC._porcvs){try{AC._porcvs.lfo.stop();}catch(e){}AC._porcvs=null;AC.sharedFilter.frequency.setTargetAtTime(6000,t,0.3);}}},
  viscera:{apply(t){AC.sharedFilter.Q.setTargetAtTime(3.5,t,0.2);},remove(t){AC.sharedFilter.Q.setTargetAtTime(0.7,t,0.3);}},
};

function applyModifiers(){
  if(!AC.ctx)return;const t=AC.ctx.currentTime+0.05;
  const ids=Object.values(VOICES).map(v=>v.relic.id);
  Object.keys(MODIFIERS).forEach(k=>{
    if(ids.includes(k))MODIFIERS[k].apply(t);
  });
}

// ══════ DILLA TIMING ══════
function getDillaOffset(step){
  const base=[0,0.010,0.015,0.008,0,0.012,0.020,0.009,0,0.010,0.016,0.007,0,0.011,0.022,0.008];
  return base[step%16]+(Math.random()*0.004);
}

// ══════ SEQUENCER ══════
function startSequencer(){if(timerID)return;nextStepTime=AC.ctx.currentTime+0.05;stepIndex=0;tick();}
function tick(){
  // Resume AudioContext if suspended (mobile browsers, tab backgrounding)
  if(AC.ctx&&AC.ctx.state==='suspended')AC.ctx.resume();
  try{
    while(nextStepTime<AC.ctx.currentTime+SCHEDULE_AHEAD){
      scheduleStep(stepIndex,nextStepTime);nextStepTime+=STEP_DUR;stepIndex=(stepIndex+1)%16;
    }
    // If clock drifted too far behind (tab was backgrounded), resync
    if(AC.ctx.currentTime-nextStepTime>1.0){nextStepTime=AC.ctx.currentTime+0.05;}
  }catch(e){console.error('tick error:',e.message);}
  timerID=setTimeout(tick,TICK_MS);
}
// Watchdog: restart sequencer if it dies while voices exist
setInterval(()=>{
  if(Object.keys(VOICES).length>0&&!timerID){
    console.warn('Sequencer watchdog: restarting');
    startSequencer();
  }
},2000);

function scheduleStep(step,time){
  let t=time;
  if(SWING.active&&step%2===1)t+=STEP_DUR*SWING.amount*0.38;
  for(const[,v]of Object.entries(VOICES)){
    const sd=v.pattern&&v.pattern[step];if(!sd)continue;
    let vt=t;
    if(v.saint.id==='symeon')vt+=getDillaOffset(step);
    // Bartholomew drag: non-kick voices land 20-35ms behind the beat (screwed feel)
    if(v.saint.id==='bartholomew'&&v.relic.role!=='kick')vt+=0.020+Math.random()*0.015;
    triggerVoice(v,vt,step,sd);
  }
  if(auditionVoice){const sd=auditionVoice.pattern&&auditionVoice.pattern[step];if(sd)triggerVoice(auditionVoice,t,step,sd);}
  if(step%4===0){const delay=Math.max(0,(time-AC.ctx.currentTime)*1000);setTimeout(flashBeatHits,delay);}
}

function triggerVoice(v,time,step,sd){
  if(!v.synthFn)return;
  try{
    const hz=sd.hz||v.saint.freq;
    const vel=sd.v!=null?sd.v:0.8;
    const dur=(sd.dur||1)*STEP_DUR*0.85;
    const acc=sd.acc||false;
    const slide=sd.slide||false;
    v.synthFn(AC.ctx,v,time,dur,hz,vel,acc,slide,step);
  }catch(e){console.error('triggerVoice error:',v.relic?.id,e.message);}
}

// ══════ SYNTHESIS HELPERS ══════
function _out(v){return v.output;}
function humanize(val,pct){return val*(1+(Math.random()-0.5)*pct);}
function velBright(hz,vel,base,range){return hz*(base+vel*range);}

function makeSub(c,out,t,hz,vel,dur){
  const o=c.createOscillator();o.type='sine';
  o.frequency.setValueAtTime(hz,t);o.frequency.exponentialRampToValueAtTime(hz*0.85,t+0.04);
  const e=c.createGain();e.gain.setValueAtTime(0,t);e.gain.linearRampToValueAtTime(vel*0.55,t+0.008);
  e.gain.exponentialRampToValueAtTime(0.001,t+Math.max(dur*1.8,0.15));
  o.connect(e);e.connect(out);o.start(t);o.stop(t+dur*2+0.05);
}

function makeNoise(c,out,t,vel,dur,lpF,hpF){
  const bl=Math.floor(c.sampleRate*Math.max(dur,0.06));
  const buf=c.createBuffer(1,bl,c.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<bl;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/bl,1.5);
  const src=c.createBufferSource();src.buffer=buf;
  const e=c.createGain();e.gain.setValueAtTime(vel*0.45,t);e.gain.exponentialRampToValueAtTime(0.001,t+Math.max(dur,0.04));
  let node=src;
  if(hpF){const hp=c.createBiquadFilter();hp.type='highpass';hp.frequency.value=hpF;src.connect(hp);node=hp;}
  if(lpF){const lp=c.createBiquadFilter();lp.type='lowpass';lp.frequency.value=lpF;node.connect(lp);lp.connect(e);}else{node.connect(e);}
  e.connect(out);src.start(t);
}

function makeSaw(c,out,t,hz,vel,dur,lpF,Q,extraDetune){
  const det=extraDetune||0;
  const o1=c.createOscillator();o1.type='sawtooth';o1.frequency.value=hz;o1.detune.value=-det;
  const o2=c.createOscillator();o2.type='sawtooth';o2.frequency.value=hz;o2.detune.value=det;
  const lp=c.createBiquadFilter();lp.type='lowpass';lp.Q.value=Q||0.7;
  lp.frequency.setValueAtTime(lpF||hz*6,t);lp.frequency.exponentialRampToValueAtTime(hz*1.8,t+dur*0.8);
  const e=c.createGain();e.gain.setValueAtTime(0,t);e.gain.linearRampToValueAtTime(vel*0.38,t+0.008);
  e.gain.setTargetAtTime(vel*0.2,t+0.008,dur*0.3);e.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o1.connect(lp);o2.connect(lp);lp.connect(e);e.connect(out);
  o1.start(t);o2.start(t);o1.stop(t+dur+0.02);o2.stop(t+dur+0.02);
}

function makeGatedSaw(c,out,t,hz,vel,bpF,Q){
  const o=c.createOscillator();o.type='sawtooth';o.frequency.value=hz;
  const bp=c.createBiquadFilter();bp.type='bandpass';bp.frequency.value=bpF||hz*2;bp.Q.value=Q||9;
  const e=c.createGain();e.gain.setValueAtTime(0,t);e.gain.linearRampToValueAtTime(vel*0.5,t+0.002);
  e.gain.linearRampToValueAtTime(0,t+0.022);
  o.connect(bp);bp.connect(e);e.connect(out);o.start(t);o.stop(t+0.03);
}

function makeFMBell(c,out,t,hz,vel,modRatio,dur){
  const car=c.createOscillator();car.type='sine';car.frequency.value=hz;
  const mod=c.createOscillator();mod.type='sine';mod.frequency.value=hz*modRatio;
  const mg=c.createGain();mg.gain.setValueAtTime(hz*3.5,t);mg.gain.exponentialRampToValueAtTime(hz*0.05,t+Math.max(dur,0.15));
  mod.connect(mg);mg.connect(car.frequency);
  const e=c.createGain();e.gain.setValueAtTime(0,t);e.gain.linearRampToValueAtTime(vel*0.32,t+0.004);
  e.gain.exponentialRampToValueAtTime(0.001,t+Math.max(dur,0.2));
  car.connect(e);e.connect(out);mod.start(t);car.start(t);mod.stop(t+dur+0.05);car.stop(t+dur+0.05);
}

function makeSlap(c,out,t,hz,vel){
  const o=c.createOscillator();o.type='sine';
  o.frequency.setValueAtTime(hz*2,t);o.frequency.exponentialRampToValueAtTime(hz,t+0.015);
  const e=c.createGain();e.gain.setValueAtTime(0,t);e.gain.linearRampToValueAtTime(vel*0.42,t+0.002);
  e.gain.exponentialRampToValueAtTime(0.001,t+0.12);
  o.connect(e);e.connect(out);o.start(t);o.stop(t+0.15);
}

function makeSolina(c,out,t,hz,vel,dur,notes){
  const ns=notes||[hz];
  ns.forEach(n=>{
    [-5,0,5].forEach(det=>{
      const o=c.createOscillator();o.type='sawtooth';o.frequency.value=n;o.detune.value=det;
      const lp=c.createBiquadFilter();lp.type='lowpass';lp.frequency.value=n*5;lp.Q.value=1.2;
      const e=c.createGain();e.gain.setValueAtTime(0,t);e.gain.linearRampToValueAtTime(vel*0.07,t+0.10);
      e.gain.setTargetAtTime(vel*0.04,t+0.10,dur*0.4);e.gain.exponentialRampToValueAtTime(0.001,t+dur*1.4);
      o.connect(lp);lp.connect(e);e.connect(out);o.start(t);o.stop(t+dur*1.5+0.05);
    });
  });
}

function makeAcid(c,out,t,hz,vel,dur,acc,slide,v){
  const o=v._acidOsc||(()=>{const o=c.createOscillator();o.type='sawtooth';return o;})();
  if(!v._acidOsc){
    const lp=c.createBiquadFilter();lp.type='lowpass';lp.Q.value=19;
    const e=c.createGain();
    o.connect(lp);lp.connect(e);e.connect(out);
    o.start(t);
    v._acidOsc=o;v._acidLp=lp;v._acidGain=e;
  }
  const lp=v._acidLp,e=v._acidGain;
  const decayT=acc?0.28:0.14;
  const peakCut=hz*(acc?8:5);
  if(!slide){
    e.gain.setValueAtTime(0,t);e.gain.linearRampToValueAtTime(vel*0.42,t+0.002);
    e.gain.setTargetAtTime(vel*0.18,t+0.002,dur*0.25);e.gain.exponentialRampToValueAtTime(0.001,t+dur);
    lp.frequency.setValueAtTime(Math.max(peakCut,60),t);
    lp.frequency.exponentialRampToValueAtTime(Math.max(hz*0.6,60),t+decayT);
    o.frequency.setValueAtTime(hz,t);
  }else{
    o.frequency.setTargetAtTime(hz,t,0.06);
  }
}

function makeBitCrush(c,out,t,hz,vel,dur,asNoise){
  const bl=Math.floor(c.sampleRate*(asNoise?dur*0.8:dur));
  const buf=c.createBuffer(1,Math.max(bl,1),c.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
  const src=c.createBufferSource();src.buffer=buf;
  const ws=c.createWaveShaper();
  const curve=new Float32Array(256);
  for(let i=0;i<256;i++){const x=(i/128)-1;curve[i]=Math.round(x*8)/8;}
  ws.curve=curve;
  const bp=c.createBiquadFilter();bp.type='bandpass';
  bp.frequency.value=asNoise?1600:hz*2;bp.Q.value=2;
  const e=c.createGain();e.gain.setValueAtTime(vel*0.3,t);e.gain.exponentialRampToValueAtTime(0.001,t+Math.max(dur,0.04));
  src.connect(ws);ws.connect(bp);bp.connect(e);e.connect(out);src.start(t);
}

// ══════ PER-SAINT SYNTH FUNCTIONS ══════

function synthBarth(c,v,t,dur,hz,vel,acc,slide,step){
  // CHOPPED & SCREWED Blue Monday — everything pitched down, slowed, syrupy
  // Frequencies scaled by 0.667 (7 semitones down), envelopes stretched,
  // filter sweeps become slow-motion "bwwwooowww"
  const o=_out(v),rid=v.relic.role;
  const screwF=0.667;// pitch-down factor: 7 semitones
  const shz=hz*screwF;// screwed root frequency
  if(rid==='rhythm'){
    // Nervus — screwed DMX snare: softened transient, longer body, pitched-down noise
    const bl=Math.floor(c.sampleRate*0.16);// longer decay (was 0.09)
    const buf=c.createBuffer(1,bl,c.sampleRate);const d=buf.getChannelData(0);
    for(let i=0;i<bl;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/bl,0.4);// slower decay curve
    const src=c.createBufferSource();src.buffer=buf;
    const bp=c.createBiquadFilter();bp.type='bandpass';bp.frequency.value=2100;bp.Q.value=1;// lower (was 3200)
    const ne=c.createGain();ne.gain.setValueAtTime(vel*0.42,t);ne.gain.exponentialRampToValueAtTime(0.001,t+0.2);
    src.connect(bp);bp.connect(ne);ne.connect(o);src.start(t);
    // Body tone — lower, tom-like
    const tn=c.createOscillator();tn.type='triangle';
    tn.frequency.setValueAtTime(120,t);tn.frequency.exponentialRampToValueAtTime(65,t+0.03);
    const te=c.createGain();te.gain.setValueAtTime(vel*0.35,t);te.gain.exponentialRampToValueAtTime(0.001,t+0.08);
    tn.connect(te);te.connect(o);tn.start(t);tn.stop(t+0.1);
  }else if(rid==='rhythm2'){
    // Musculus — screwed hi-hat: dull, sloshy, lazy. Pitched-down metallic partials
    const freqs=[530,895,1895,2565,3840,5390];// all ×0.667
    const eg=c.createGain();const len=acc?0.25:0.06;// longer (was 0.15/0.03)
    eg.gain.setValueAtTime(vel*0.10,t);eg.gain.exponentialRampToValueAtTime(0.001,t+len);
    const hp=c.createBiquadFilter();hp.type='highpass';hp.frequency.value=2600;// lower (was 4000)
    const lp=c.createBiquadFilter();lp.type='lowpass';lp.frequency.value=7000;// lower (was 12000)
    eg.connect(hp);hp.connect(lp);lp.connect(o);
    freqs.forEach(f=>{const sq=c.createOscillator();sq.type='square';sq.frequency.value=f;sq.connect(eg);sq.start(t);sq.stop(t+len+0.01);});
  }else if(rid==='kick'){
    // Os — screwed DMX kick: deep sub-bass bloom, slow boomy thud
    const k=c.createOscillator();k.type='sine';
    k.frequency.setValueAtTime(100,t);// lower start (was 150)
    k.frequency.exponentialRampToValueAtTime(28,t+0.08);// slower drop, lower floor (was 38 in 0.045)
    const e=c.createGain();e.gain.setValueAtTime(0,t);
    e.gain.linearRampToValueAtTime(vel*0.82,t+0.002);
    e.gain.setTargetAtTime(0.001,t+0.002,0.12);// longer bloom (was 0.065)
    k.connect(e);e.connect(o);k.start(t);k.stop(t+0.35);
    // Softer click — lower, duller
    const cl=c.createOscillator();cl.type='sine';cl.frequency.value=600;// was square at 1200
    const ce=c.createGain();ce.gain.setValueAtTime(vel*0.12,t);ce.gain.exponentialRampToValueAtTime(0.001,t+0.006);
    cl.connect(ce);ce.connect(o);cl.start(t);cl.stop(t+0.01);
  }else if(rid==='clock'){
    // Vena — screwed pulse: duller, slightly behind, lazy tick
    const ck=c.createOscillator();ck.type='square';ck.frequency.value=shz*4;// lower
    const bp=c.createBiquadFilter();bp.type='bandpass';bp.frequency.value=1200;bp.Q.value=2;
    const e=c.createGain();e.gain.setValueAtTime(vel*0.10,t);e.gain.exponentialRampToValueAtTime(0.001,t+0.02);
    ck.connect(bp);bp.connect(e);e.connect(o);ck.start(t);ck.stop(t+0.025);
  }else if(rid==='breath'){
    // Pulmo — screwed Juno pad: dark minor chord, 2 notes × 2 saws (4 oscs, not 12)
    const notes=[shz,shz*1.782];// root + minor 7th — dark interval
    notes.forEach((n,ni)=>{
      const o1=c.createOscillator();o1.type='sawtooth';o1.frequency.value=n;o1.detune.value=humanize(-10,0.5);
      const o2=c.createOscillator();o2.type='sawtooth';o2.frequency.value=n;o2.detune.value=humanize(10,0.5);
      const lfo=c.createOscillator();lfo.type='sine';lfo.frequency.value=0.15+ni*0.08;
      const lg=c.createGain();lg.gain.value=8;
      lfo.connect(lg);lg.connect(o1.detune);lg.connect(o2.detune);
      const lp=c.createBiquadFilter();lp.type='lowpass';lp.frequency.value=n*2;lp.Q.value=0.8;
      const e=c.createGain();e.gain.setValueAtTime(0,t);
      e.gain.linearRampToValueAtTime(vel*0.18,t+0.4);
      e.gain.setTargetAtTime(vel*0.12,t+0.4,dur*0.8);
      e.gain.exponentialRampToValueAtTime(0.001,t+dur*4);
      o1.connect(lp);o2.connect(lp);lp.connect(e);e.connect(o);
      o1.start(t);o2.start(t);lfo.start(t);
      o1.stop(t+dur*4);o2.stop(t+dur*4);lfo.stop(t+dur*4);
    });
  }else if(rid==='lead'){
    // Lingua — screwed Moog bass: slow-motion "bwwwooowww" filter sweep
    // The envelope stretches: 300ms sweep instead of 60ms. Deep, rubbery, syrupy.
    const saw1=c.createOscillator();saw1.type='sawtooth';saw1.frequency.value=shz;
    const saw2=c.createOscillator();saw2.type='sawtooth';saw2.frequency.value=shz*0.5;
    saw2.detune.value=3;
    // Tape wow: slow pitch drift on both saws
    const wow=c.createOscillator();wow.type='sine';wow.frequency.value=0.7;
    const wg=c.createGain();wg.gain.value=5;// ±5 cents wobble
    wow.connect(wg);wg.connect(saw1.detune);wg.connect(saw2.detune);
    const mix=c.createGain();mix.gain.value=1;
    saw1.connect(mix);saw2.connect(mix);
    // Slow-motion filter sweep — THE screwed "bwwwooowww"
    const lp=c.createBiquadFilter();lp.type='lowpass';
    lp.Q.value=acc?14:10;
    const peak=shz*(acc?12:7);
    lp.frequency.setValueAtTime(peak,t);
    lp.frequency.exponentialRampToValueAtTime(shz*1.8,t+0.3);// SLOW sweep (was 0.06s)
    lp.frequency.setTargetAtTime(shz*0.4,t+0.3,0.25);// longer tail
    const e=c.createGain();e.gain.setValueAtTime(0,t);

function synthLucy(c,v,t,dur,hz,vel,acc,slide,step){
  const o=_out(v),rid=v.relic.role;
  if(rid==='snare'){
    // Patella — the plate: ghostly rimshot, soft and distant, barely there
    const bl=Math.floor(c.sampleRate*0.04);
    const buf=c.createBuffer(1,bl,c.sampleRate);const d=buf.getChannelData(0);
    for(let i=0;i<bl;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/bl,2.5);
    const src=c.createBufferSource();src.buffer=buf;
    const bp=c.createBiquadFilter();bp.type='bandpass';bp.frequency.value=2200;bp.Q.value=2;
    const e=c.createGain();e.gain.setValueAtTime(vel*0.18,t);e.gain.exponentialRampToValueAtTime(0.001,t+0.06);
    src.connect(bp);bp.connect(e);e.connect(o);src.start(t);
  }else if(rid==='pad'){
    // Lvx — divine light: massive Juno-60 pad, 6 detuned saws with slow chorus LFO
    // This is the enveloping warmth — the air in Eyes Without a Face
    const voices=[hz,hz*1.5,hz*2];// root, fifth, octave
    voices.forEach((n,vi)=>{
      const o1=c.createOscillator();o1.type='sawtooth';o1.frequency.value=n;o1.detune.value=-8;
      const o2=c.createOscillator();o2.type='sawtooth';o2.frequency.value=n;o2.detune.value=8;
      // Slow chorus: each voice pair drifts independently
      const lfo=c.createOscillator();lfo.type='sine';lfo.frequency.value=0.15+vi*0.08;
      const lg=c.createGain();lg.gain.value=6;lfo.connect(lg);lg.connect(o1.detune);lg.connect(o2.detune);
      const lp=c.createBiquadFilter();lp.type='lowpass';
      lp.frequency.setValueAtTime(n*2,t);
      lp.frequency.setTargetAtTime(n*4,t,dur*1.5);// slow filter bloom
      lp.Q.value=0.4;
      const e=c.createGain();e.gain.setValueAtTime(0,t);
      e.gain.linearRampToValueAtTime(vel*0.09,t+0.25);// very slow attack
      e.gain.setTargetAtTime(vel*0.06,t+0.25,dur*0.8);
      e.gain.exponentialRampToValueAtTime(0.001,t+dur*3);
      o1.connect(lp);o2.connect(lp);lp.connect(e);e.connect(o);
      o1.start(t);o2.start(t);lfo.start(t);
      o1.stop(t+dur*3.2);o2.stop(t+dur*3.2);lfo.stop(t+dur*3.2);
    });
  }else if(rid==='melody'){
    // Lacrimae — tears: weeping Solina with formant sweep, the vocal cry
    // This should sound like someone sobbing through a synthesizer
    const saws=[-12,-4,0,4,12];
    const formant1=c.createBiquadFilter();formant1.type='bandpass';formant1.Q.value=5;
    // Formant sweep: "ah" (800Hz) → "oh" (450Hz) — the sound of a mouth opening then closing in grief
    formant1.frequency.setValueAtTime(800,t);
    formant1.frequency.exponentialRampToValueAtTime(450,t+dur*1.2);
    const formant2=c.createBiquadFilter();formant2.type='bandpass';
    formant2.frequency.setValueAtTime(2600,t);
    formant2.frequency.exponentialRampToValueAtTime(1800,t+dur*1.2);
    formant2.Q.value=3;
    const mix=c.createGain();mix.gain.value=1;
    const e=c.createGain();e.gain.setValueAtTime(0,t);
    e.gain.linearRampToValueAtTime(vel*0.14,t+0.06);
    e.gain.setTargetAtTime(vel*0.08,t+0.06,dur*0.5);
    e.gain.exponentialRampToValueAtTime(0.001,t+dur*1.8);
    saws.forEach(det=>{
      const s=c.createOscillator();s.type='sawtooth';s.frequency.value=hz;s.detune.value=det;
      s.connect(formant1);s.connect(formant2);s.start(t);s.stop(t+dur*2);
    });
    formant1.connect(mix);formant2.connect(mix);mix.connect(e);e.connect(o);
  }else if(rid==='swell'){
    // Corona — crown of light: slow-building shimmer that blooms from nothing
    const notes=[hz,hz*1.26,hz*1.5,hz*1.875];// Eb maj7
    notes.forEach((n,i)=>{
      const o1=c.createOscillator();o1.type='sine';o1.frequency.value=n;
      const o2=c.createOscillator();o2.type='triangle';o2.frequency.value=n;o2.detune.value=3;
      const e=c.createGain();e.gain.setValueAtTime(0,t);
      // Staggered bloom — each note fades in at a different rate
      e.gain.linearRampToValueAtTime(vel*0.08,t+0.15+i*0.08);
      e.gain.setTargetAtTime(vel*0.05,t+0.3,dur);
      e.gain.exponentialRampToValueAtTime(0.001,t+dur*3.5);
      o1.connect(e);o2.connect(e);e.connect(o);
      o1.start(t);o2.start(t);o1.stop(t+dur*3.6);o2.stop(t+dur*3.6);
    });
  }else if(rid==='phaser'){
    // Ocvlvs — the gouged eyes: phased saws with very slow sweep, disoriented vision
    const saws=[-7,0,7];
    const ap1=c.createBiquadFilter();ap1.type='allpass';ap1.frequency.value=600;ap1.Q.value=0.7;
    const ap2=c.createBiquadFilter();ap2.type='allpass';ap2.frequency.value=1200;ap2.Q.value=0.7;
    const pLfo=c.createOscillator();pLfo.type='sine';pLfo.frequency.value=0.12;// very slow
    const plg1=c.createGain();plg1.gain.value=400;
    const plg2=c.createGain();plg2.gain.value=600;
    pLfo.connect(plg1);plg1.connect(ap1.frequency);
    pLfo.connect(plg2);plg2.connect(ap2.frequency);
    const lp=c.createBiquadFilter();lp.type='lowpass';lp.frequency.value=hz*6;lp.Q.value=1;
    const e=c.createGain();e.gain.setValueAtTime(0,t);
    e.gain.linearRampToValueAtTime(vel*0.28,t+0.12);
    e.gain.setTargetAtTime(vel*0.18,t+0.12,dur*0.6);
    e.gain.exponentialRampToValueAtTime(0.001,t+dur*2);
    saws.forEach(d=>{const s=c.createOscillator();s.type='sawtooth';s.frequency.value=hz;s.detune.value=d;s.connect(lp);s.start(t);s.stop(t+dur*2.1);});
    lp.connect(ap1);ap1.connect(ap2);ap2.connect(e);e.connect(o);pLfo.start(t);pLfo.stop(t+dur*2.1);
  }else if(rid==='chord'){
    // Manvs — hands: chorus-drenched minor chord stabs, Steve Stevens clean guitar character
    const chord=[hz,hz*1.189,hz*1.5];// root, minor third, fifth
    chord.forEach(n=>{
      const o1=c.createOscillator();o1.type='triangle';o1.frequency.value=n;o1.detune.value=-6;
      const o2=c.createOscillator();o2.type='triangle';o2.frequency.value=n;o2.detune.value=6;
      const lfo=c.createOscillator();lfo.type='sine';lfo.frequency.value=0.8+Math.random()*0.4;
      const lg=c.createGain();lg.gain.value=5;lfo.connect(lg);lg.connect(o1.detune);lg.connect(o2.detune);
      const e=c.createGain();e.gain.setValueAtTime(0,t);
      e.gain.linearRampToValueAtTime(vel*0.12,t+0.008);
      e.gain.setTargetAtTime(vel*0.06,t+0.008,dur*0.5);
      e.gain.exponentialRampToValueAtTime(0.001,t+dur*1.8);
      o1.connect(e);o2.connect(e);e.connect(o);
      o1.start(t);o2.start(t);lfo.start(t);
      o1.stop(t+dur*2);o2.stop(t+dur*2);lfo.stop(t+dur*2);
    });
  }else if(rid==='drone'){
    // Vmbra — shadow: the vastness of nothing. Sub-bass drone with beating frequencies
    const sub1=c.createOscillator();sub1.type='sine';sub1.frequency.value=hz*0.5;
    const sub2=c.createOscillator();sub2.type='sine';sub2.frequency.value=hz*0.5+0.3;// 0.3Hz beat frequency
    const sub3=c.createOscillator();sub3.type='sine';sub3.frequency.value=hz*0.25;// sub-sub octave
    const lp=c.createBiquadFilter();lp.type='lowpass';lp.frequency.value=hz;lp.Q.value=2;
    const e=c.createGain();e.gain.setValueAtTime(0,t);
    e.gain.linearRampToValueAtTime(vel*0.35,t+0.3);// slow fade in
    e.gain.setTargetAtTime(vel*0.25,t+0.3,dur);
    e.gain.exponentialRampToValueAtTime(0.001,t+dur*4);
    sub1.connect(lp);sub2.connect(lp);sub3.connect(lp);lp.connect(e);e.connect(o);
    sub1.start(t);sub2.start(t);sub3.start(t);
    sub1.stop(t+dur*4.1);sub2.stop(t+dur*4.1);sub3.stop(t+dur*4.1);
  }else if(rid==='tremolo'){
    // Flamma — the longing vocal: reaching up then resolving down, sadly
    // Detuned saws through vocal formants, pitch bends up minor 3rd then falls
    const e=c.createGain();e.gain.setValueAtTime(0,t);
    e.gain.linearRampToValueAtTime(vel*0.12,t+0.12);
    e.gain.setTargetAtTime(vel*0.08,t+0.12,dur*0.5);
    e.gain.exponentialRampToValueAtTime(0.001,t+dur*2);
    e.connect(o);
    // Vibrato LFO — gentle pitch wobble
    const vib=c.createOscillator();vib.type='sine';vib.frequency.value=5.5;
    const vg=c.createGain();vg.gain.value=3;// ±3 cents
    vib.connect(vg);vib.start(t);vib.stop(t+dur*2.2);
    const startHz=hz;const peakHz=hz*1.189;// minor 3rd
    [-8,-3,0,3,8].forEach(det=>{
      const s=c.createOscillator();s.type='sawtooth';s.detune.value=det;
      s.frequency.setValueAtTime(startHz,t);
      s.frequency.linearRampToValueAtTime(peakHz,t+dur*0.35);// reach
      s.frequency.exponentialRampToValueAtTime(startHz,t+dur*1.2);// resolve
      vg.connect(s.detune);// vibrato on each voice
      // Formants: "eh" opening to "ah"
      const f1=c.createBiquadFilter();f1.type='bandpass';f1.Q.value=6;
      f1.frequency.setValueAtTime(600,t);f1.frequency.linearRampToValueAtTime(800,t+dur*0.8);
      const f2=c.createBiquadFilter();f2.type='bandpass';f2.Q.value=4;
      f2.frequency.setValueAtTime(1800,t);f2.frequency.linearRampToValueAtTime(1200,t+dur*0.8);
      s.connect(f1);s.connect(f2);f1.connect(e);f2.connect(e);
      s.start(t);s.stop(t+dur*2.2);
    });
  }else{
    makeSolina(c,o,t,hz,vel,dur,null);
  }
}

function synthSeb(c,v,t,dur,hz,vel,acc,slide,step){
  const rid=v.relic.role;
  if(rid==='arrow'){
    const bp=c.createBiquadFilter();bp.type='bandpass';bp.frequency.value=3000+Math.random()*2500;bp.Q.value=5;
    const bl=Math.floor(c.sampleRate*0.015);const buf=c.createBuffer(1,Math.max(bl,1),c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3);

    src.connect(bp);bp.connect(e);e.connect(_out(v));src.start(t);
  }else if(rid==='bass'){
    makeSaw(c,_out(v),t,hz,vel,dur*1.5,hz*3,4,3);

  }else if(rid==='pad'){

  }else if(rid==='scratch'){

    const bright=step%2===0?hz*5:hz*3;

    o.frequency.setValueAtTime(hz*4,t);o.frequency.exponentialRampToValueAtTime(hz*0.5,t+0.03);

    e.gain.exponentialRampToValueAtTime(0.001,t+0.04);

function synthAnth(c,v,t,dur,hz,vel,acc,slide,step){
  const rid=v.relic.role;
  if(rid==='perc'){
    if(Math.random()>0.15)return;
    const pf=[1800,2800,4200,1200,3600][Math.floor(Math.random()*5)];
    const o=c.createOscillator();o.type='sine';
    o.frequency.setValueAtTime(pf,t);o.frequency.exponentialRampToValueAtTime(pf*0.28,t+0.05);
    const e=c.createGain();e.gain.setValueAtTime(vel*0.3,t);e.gain.exponentialRampToValueAtTime(0.001,t+0.07);
    o.connect(e);e.connect(_out(v));o.start(t);o.stop(t+0.08);
  }else if(rid==='pad'){
    const car=c.createOscillator();car.type='sine';car.frequency.value=hz;
    const mod=c.createOscillator();mod.type='sine';mod.frequency.value=hz*1.414;
    const mg=c.createGain();mg.gain.setValueAtTime(hz*1.8,t);mg.gain.exponentialRampToValueAtTime(hz*0.25,t+dur);
    mod.connect(mg);mg.connect(car.frequency);
    const e=c.createGain();e.gain.setValueAtTime(0,t);e.gain.linearRampToValueAtTime(vel*0.28,t+0.15);
    e.gain.setTargetAtTime(vel*0.15,t+0.15,dur*0.35);e.gain.exponentialRampToValueAtTime(0.001,t+dur);
    car.connect(e);e.connect(_out(v));mod.start(t);car.start(t);mod.stop(t+dur+0.05);car.stop(t+dur+0.05);
  }else if(rid==='bass'){
    makeSlap(c,_out(v),t,hz,vel);
  }else if(rid==='bell'){
    // Campana — distant bronze bell: multiple inharmonic partials with long decay
    // Real bells have partials at non-integer ratios. Each partial decays independently.
    // The strike tone fades fast, the hum tone lingers.
    const dhz=hz*0.5*humanize(1,0.01);// lower fundamental — this is a big bell
    const partials=[
      {ratio:0.5,amp:0.18,decay:2.5},  // hum — lowest, longest
      {ratio:1.0,amp:0.25,decay:1.8},  // prime — the "note"
      {ratio:1.183,amp:0.12,decay:1.2}, // tierce (minor 3rd)
      {ratio:1.506,amp:0.10,decay:1.0}, // quint (5th)
      {ratio:2.0,amp:0.08,decay:0.6},  // nominal (octave)
      {ratio:2.514,amp:0.04,decay:0.4}, // high partial
    ];
    // Lowpass to soften — heard through stone walls
    const lp=c.createBiquadFilter();lp.type='lowpass';
    lp.frequency.setValueAtTime(1200+vel*800,t);
    lp.frequency.exponentialRampToValueAtTime(400,t+2.0);// filter closes slowly
    lp.Q.value=0.5;
    lp.connect(_out(v));
    partials.forEach(p=>{
      const o=c.createOscillator();o.type='sine';o.frequency.value=dhz*p.ratio;
      o.detune.value=humanize(0,2);// slight detuning per partial
      const e=c.createGain();e.gain.setValueAtTime(0,t);
      e.gain.linearRampToValueAtTime(vel*p.amp,t+0.003+Math.random()*0.004);
      e.gain.exponentialRampToValueAtTime(0.001,t+p.decay);
      o.connect(e);e.connect(lp);o.start(t);o.stop(t+p.decay+0.05);
    });
  }else if(rid==='kick'){
    makeSub(c,_out(v),t,hz,vel,dur);
  }else if(rid==='sweep'){
    const o=c.createOscillator();o.type='sawtooth';o.frequency.value=hz*0.5;
    const lp=c.createBiquadFilter();lp.type='lowpass';lp.Q.value=18;
    lp.frequency.setValueAtTime(hz*0.5,t);lp.frequency.exponentialRampToValueAtTime(hz*3,t+0.1);
    const e=c.createGain();e.gain.setValueAtTime(0,t);e.gain.linearRampToValueAtTime(vel*0.25,t+0.004);
    e.gain.setTargetAtTime(vel*0.12,t+0.004,dur*0.3);e.gain.exponentialRampToValueAtTime(0.001,t+dur*1.5);
    o.connect(lp);lp.connect(e);e.connect(_out(v));o.start(t);o.stop(t+dur*1.5+0.02);
  }else if(rid==='drone'){
    const o=c.createOscillator();o.type='sine';o.frequency.value=hz*0.5;
    const e=c.createGain();e.gain.setValueAtTime(0,t);e.gain.linearRampToValueAtTime(vel*0.25,t+0.06);
    e.gain.setTargetAtTime(0.001,t+0.06,dur*4);
    o.connect(e);e.connect(_out(v));o.start(t);o.stop(t+dur*4+0.1);
  }else if(rid==='high'){
    // Searing hellfire: sawtooth at hz*2 with sweeping bandpass, audible gain
    const o=c.createOscillator();o.type='sawtooth';o.frequency.value=hz*2;
    const bp=c.createBiquadFilter();bp.type='bandpass';bp.Q.value=6;
    bp.frequency.setValueAtTime(hz*6,t);bp.frequency.exponentialRampToValueAtTime(hz*1.5,t+dur*1.2);
    const e=c.createGain();e.gain.setValueAtTime(0,t);e.gain.linearRampToValueAtTime(vel*0.42,t+0.006);
    e.gain.setTargetAtTime(vel*0.2,t+0.006,dur*0.4);
    e.gain.exponentialRampToValueAtTime(0.001,t+dur*1.5);
    o.connect(bp);bp.connect(e);e.connect(_out(v));o.start(t);o.stop(t+dur*1.5+0.02);
  }else{
    makeFMBell(c,_out(v),t,hz,vel*0.7,2,0.3);
  }
}

function synthSymeon(c,v,t,dur,hz,vel,acc,slide,step){

  }else if(rid==='bass'){
    // Dead dog bass: velocity-tracked filter, tanh saturation, sub sine layer
    const dhz=humanize(hz,0.008);
    const o=c.createOscillator();o.type='sawtooth';o.frequency.value=dhz;
    const lpCut=180+vel*400;  // soft=deep, loud=growl

    e.gain.setTargetAtTime(vel*0.25,t+0.006,dur*0.5);

  }else if(rid==='vocal'){
    if(Math.random()>0.85)return;  // 85% chance to trigger (was 35%)
    const o=c.createOscillator();o.type='sawtooth';o.frequency.value=humanize(hz,0.01);
    const bp=c.createBiquadFilter();bp.type='bandpass';bp.frequency.value=humanize(700,0.1);bp.Q.value=4;
    const e=c.createGain();e.gain.setValueAtTime(0,t);e.gain.linearRampToValueAtTime(vel*0.38,t+0.008);
    e.gain.exponentialRampToValueAtTime(0.001,t+0.09);
    o.connect(bp);bp.connect(e);e.connect(_out(v));o.start(t);o.stop(t+0.1);

// ══════ VOICE BUILDER ══════
function buildVoice(relic,saint,outputNode){
  const c=AC.ctx,vg=c.createGain();vg.gain.value=0.7;
  let dest=outputNode||AC.master;
  if(saint.id==='bartholomew'){
    // Chopped & screwed signal chain: voice → boost → lowpass (underwater) → flanger → dest
    const screwBoost=c.createGain();screwBoost.gain.value=1.4;// moderate compensation (was 2.5, caused clipping)
    const screwLP=c.createBiquadFilter();screwLP.type='lowpass';screwLP.frequency.value=5000;screwLP.Q.value=0.6;
    // Flanger: slow sweep, subtle feedback, syrupy movement
    const flDry=c.createGain();flDry.gain.value=0.7;
    const flWet=c.createGain();flWet.gain.value=0.3;
    const flDelay=c.createDelay(0.02);flDelay.delayTime.value=0.003;
    const flFb=c.createGain();flFb.gain.value=0.3;
    const flLfo=c.createOscillator();flLfo.type='sine';flLfo.frequency.value=0.15;
    const flLfoG=c.createGain();flLfoG.gain.value=0.002;
    flLfo.connect(flLfoG);flLfoG.connect(flDelay.delayTime);flLfo.start();
    flDelay.connect(flFb);flFb.connect(flDelay);
    flDelay.connect(flWet);
    screwLP.connect(flDry);screwLP.connect(flDelay);
    flDry.connect(dest);flWet.connect(dest);
    vg.connect(screwBoost);screwBoost.connect(screwLP);
    vg._screwLfo=flLfo;// store for cleanup
  }else{
    vg.connect(dest);
  }
  if(saint.id!=='bartholomew'&&relic.id!=='patella')vg.connect(AC.reverbSend);
  const pattern=(PATTERNS[saint.id]&&PATTERNS[saint.id][relic.id])||null;
  const synthFn=SYNTH_FNS[saint.id]||null;
  return{output:vg,pattern,synthFn,saint,relic};
}

// Shared pink noise buffer (spectral slope -3dB/octave, not white noise)
let _pinkBuf=null;
function getPinkNoise(ctx){
  if(_pinkBuf)return _pinkBuf;
  const len=ctx.sampleRate*2,buf=ctx.createBuffer(1,len,ctx.sampleRate),d=buf.getChannelData(0);
  let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
  for(let i=0;i<len;i++){
    const w=Math.random()*2-1;
    b0=0.99886*b0+w*0.0555179;b1=0.99332*b1+w*0.0750759;
    b2=0.969*b2+w*0.153852;b3=0.8665*b3+w*0.3104856;
    b4=0.55*b4+w*0.5329522;b5=-0.7616*b5-w*0.016898;
    d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11;b6=w*0.115926;
  }
  _pinkBuf=buf;return buf;
}

function synthIncensum(ctx,out){
  // Thurifer: sinusoidal stereo panner (pendulum), chain clinks at apex,
  // narrow-band smoke texture — NOT white noise
  const panner=ctx.createStereoPanner();
  const panLFO=ctx.createOscillator();panLFO.type='sine';panLFO.frequency.value=1/3.2;
  const panG=ctx.createGain();panG.gain.value=0.7;
  panLFO.connect(panG);panG.connect(panner.pan);panLFO.start();
  panner.connect(out);

  // Smoke: pink noise → tight bandpass (200–600 Hz), very quiet, slow breath LFO
  const ns=ctx.createBufferSource();ns.buffer=getPinkNoise(ctx);ns.loop=true;
  const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=380;bp.Q.value=1.8;
  const sg=ctx.createGain();sg.gain.value=0.02;
  const slfo=ctx.createOscillator();slfo.type='sine';slfo.frequency.value=0.08;
  const slg=ctx.createGain();slg.gain.value=0.006;
  slfo.connect(slg);slg.connect(sg.gain);
  const smokeDrift=ctx.createOscillator();smokeDrift.type='sine';smokeDrift.frequency.value=0.02;
  const smokeDG=ctx.createGain();smokeDG.gain.value=30; // ±30 Hz drift
  smokeDrift.connect(smokeDG);smokeDG.connect(bp.frequency);smokeDrift.start();
  ns.connect(bp);bp.connect(sg);sg.connect(panner);ns.start();slfo.start();

  // Chain clink: metallic transient — two resonant sine pings (bronze partials at 3200+5600 Hz)
  // with steep exponential decay, routed through pendulum panner
  let alive=true;
  function clink(){
    if(!alive)return;
    const t=ctx.currentTime;
    [3200+Math.random()*300,5600+Math.random()*400].forEach(hz=>{
      const o=ctx.createOscillator();o.type='sine';o.frequency.value=hz;
      const e=ctx.createGain();
      e.gain.setValueAtTime(0,t);e.gain.linearRampToValueAtTime(0.035,t+0.001);
      e.gain.exponentialRampToValueAtTime(0.0001,t+0.08);
      o.connect(e);e.connect(panner);o.start(t);o.stop(t+0.1);
    });
    setTimeout(clink,1600+Math.random()*200);
  }
  clink();
  return{stop(){alive=false;try{ns.stop();slfo.stop();panLFO.stop();smokeDrift.stop();}catch(e){}},
    scaleUp(f,t,d){sg.gain.setTargetAtTime(0.02*f,t,d*0.3);}};
}

function synthCereus(ctx,out){
  // Votive candle bank: pink noise flame (NOT white), wax drip chirps, rare wick crackle
  // Primary flame: pink noise → lowpass 1200 Hz (warm, not harsh), gentle flicker LFO
  const ns=ctx.createBufferSource();ns.buffer=getPinkNoise(ctx);ns.loop=true;
  const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=1200;lp.Q.value=0.5;
  const hs=ctx.createBiquadFilter();hs.type='highshelf';hs.frequency.value=3000;hs.gain.value=-8;
  const fg=ctx.createGain();fg.gain.value=0.014;
  const flfo=ctx.createOscillator();flfo.type='sine';flfo.frequency.value=0.7;
  const flg=ctx.createGain();flg.gain.value=0.004;
  flfo.connect(flg);flg.connect(fg.gain);
  ns.connect(lp);lp.connect(hs);hs.connect(fg);fg.connect(out);ns.start();flfo.start();

  let alive=true;
  // Wax drip: sine chirp 800→200 Hz, bubble-like, very soft
  function drip(){
    if(!alive)return;
    const t=ctx.currentTime;
    const o=ctx.createOscillator();o.type='sine';
    o.frequency.setValueAtTime(700+Math.random()*200,t);
    o.frequency.exponentialRampToValueAtTime(180+Math.random()*40,t+0.12);
    const e=ctx.createGain();
    e.gain.setValueAtTime(0,t);e.gain.linearRampToValueAtTime(0.025,t+0.002);
    e.gain.exponentialRampToValueAtTime(0.0001,t+0.16);
    o.connect(e);e.connect(out);o.start(t);o.stop(t+0.2);
    setTimeout(drip,12000+Math.random()*18000);
  }
  // Wick crackle: very brief sine impulse at high freq, shaped like a pop — not a noise burst
  function crackle(){
    if(!alive)return;
    const t=ctx.currentTime;
    const hz=1800+Math.random()*2000;
    const o=ctx.createOscillator();o.type='sine';o.frequency.value=hz;
    o.frequency.exponentialRampToValueAtTime(hz*0.3,t+0.05);
    const e=ctx.createGain();
    e.gain.setValueAtTime(0,t);e.gain.linearRampToValueAtTime(0.02,t+0.0005);
    e.gain.exponentialRampToValueAtTime(0.0001,t+0.06);
    o.connect(e);e.connect(out);o.start(t);o.stop(t+0.08);
    setTimeout(crackle,25000+Math.random()*25000);
  }
  drip();crackle();
  return{stop(){alive=false;try{ns.stop();flfo.stop();}catch(e){}},
    scaleUp(f,t,d){fg.gain.setTargetAtTime(0.014*f,t,d*0.3);}};
}

function synthCalix(ctx,out){
  // Chalice: proper bell synthesis with inharmonic partials + amplitude-weighted decay rates
  // Higher partials decay faster (physically accurate). No noise "water" component —
  // replaced with a low sine resonance that blooms after the bell strike (sympathetic ring)
  let alive=true;
  const hz=220; // A3, minor bell
  const partials=[ // [ratio, amplitude, decayMultiplier]
    [0.5,  0.10, 0.5],  // hum tone
    [1.0,  0.30, 1.0],  // prime/strike
    [1.2,  0.15, 1.8],  // minor third
    [1.5,  0.20, 1.4],  // fifth
    [2.0,  0.12, 2.5],  // nominal
    [2.47, 0.06, 3.5],  // superquint
    [3.0,  0.03, 4.5],  // octave nominal
  ];
  function bell(gm){
    const t=ctx.currentTime;
    // Impact transient: noise burst through HP
    const impN=ctx.createBufferSource();
    const impBuf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*0.005),ctx.sampleRate);
    const impD=impBuf.getChannelData(0);for(let j=0;j<impD.length;j++)impD[j]=(Math.random()*2-1);
    impN.buffer=impBuf;
    const impHP=ctx.createBiquadFilter();impHP.type='highpass';impHP.frequency.value=4000;
    const impG=ctx.createGain();impG.gain.setValueAtTime(0.015,t);impG.gain.exponentialRampToValueAtTime(0.0001,t+0.005);
    impN.connect(impHP);impHP.connect(impG);impG.connect(out);impN.start(t);
    partials.forEach(([r,amp,dk])=>{
      const o=ctx.createOscillator();o.type='sine';o.frequency.value=hz*r;
      const jt=t+Math.random()*0.005; // jittered start time
      const e=ctx.createGain();
      e.gain.setValueAtTime(0,jt);
      e.gain.linearRampToValueAtTime((gm||0.035)*amp,jt+0.004);
      e.gain.exponentialRampToValueAtTime(0.0001,jt+7/dk);
      o.connect(e);e.connect(out);o.start(jt);o.stop(jt+7/dk+0.2);
    });
    // Sympathetic resonance: low sine bloom after strike, like the chalice body ringing
    const sr=ctx.createOscillator();sr.type='sine';sr.frequency.value=hz*0.5;
    const se=ctx.createGain();
    se.gain.setValueAtTime(0,t);se.gain.linearRampToValueAtTime((gm||0.035)*0.04,t+1.5);
    se.gain.exponentialRampToValueAtTime(0.0001,t+8);
    sr.connect(se);se.connect(out);sr.start(t);sr.stop(t+8.5);
  }
  bell(0.035);
  let bellTimer;
  function scheduleBell(){bellTimer=setTimeout(()=>{if(alive){bell(0.035);scheduleBell();}},55000+Math.random()*35000);}
  scheduleBell();
  return{stop(){alive=false;clearTimeout(bellTimer);}};
}

function synthLilium(ctx,out){
  // Petal pad: two detuned sines a fifth apart, gentle and warm
  const o1=ctx.createOscillator();o1.type='sine';o1.frequency.value=440;o1.detune.value=(Math.random()-0.5)*8;
  const o2=ctx.createOscillator();o2.type='sine';o2.frequency.value=660;o2.detune.value=(Math.random()-0.5)*8;
  const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=1800;lp.Q.value=0.5;
  const mg=ctx.createGain();mg.gain.value=0.024;
  const blfo=ctx.createOscillator();blfo.type='sine';blfo.frequency.value=0.06;
  const bg=ctx.createGain();bg.gain.value=0.012;
  blfo.connect(bg);bg.connect(mg.gain);
  o1.connect(lp);o2.connect(lp);lp.connect(mg);mg.connect(out);
  o1.start();o2.start();blfo.start();
  // Soft breathy texture
  const ns=ctx.createBufferSource();ns.buffer=getPinkNoise(ctx);ns.loop=true;
  const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=2400;bp.Q.value=1.8;
  const ng=ctx.createGain();ng.gain.value=0.016;
  ns.connect(bp);bp.connect(ng);ng.connect(out);ns.start();
  return{stop(){try{o1.stop();o2.stop();blfo.stop();ns.stop();}catch(e){}},
    scaleUp(f,t,d){mg.gain.setTargetAtTime(0.024*f,t,d*0.3);ng.gain.setTargetAtTime(0.016*f,t,d*0.3);}};
}

function synthLiber(ctx,out){
  // Warm vocal room — not menacing, not horror. The sound of a handful of monks
  // murmuring vespers in a stone chapel. Soft, rounded, human.
  // Triangle waves (not saws) through gentle lowpass (not bandpass) with tanh saturation
  // to round everything warm, like Symeon's Canis approach but higher and vocal.
  const voices=[
    {hz:130,gain:0.04},  // baritone unison 1
    {hz:132,gain:0.038}, // baritone unison 2 (1.5Hz beating = gentle chorus)
    {hz:196,gain:0.032}, // tenor — a fifth above
    {hz:198,gain:0.030}, // tenor 2 (beating)
    {hz:262,gain:0.020}, // alto — octave above baritone
  ];
  const oscs=[];const gains=[];
  // Shared tanh saturation — warms and rounds the signal like analog tape
  const sat=ctx.createWaveShaper();
  const curve=new Float32Array(256);
  for(let i=0;i<256;i++){const x=(i/128)-1;curve[i]=Math.tanh(x*1.5);}
  sat.curve=curve;sat.oversample='2x';
  // Gentle lowpass — no harsh harmonics, just warm body
  const masterLP=ctx.createBiquadFilter();masterLP.type='lowpass';masterLP.frequency.value=1800;masterLP.Q.value=0.5;
  sat.connect(masterLP);masterLP.connect(out);
  voices.forEach(v=>{
    const o=ctx.createOscillator();o.type='triangle';// soft harmonics, not buzzy
    o.frequency.value=v.hz;o.detune.value=(Math.random()-0.5)*8;
    const g=ctx.createGain();g.gain.value=v.gain;
    // Very slow breathing — 20-30 second cycles
    const amLfo=ctx.createOscillator();amLfo.type='sine';
    amLfo.frequency.value=0.035+Math.random()*0.03;
    const amG=ctx.createGain();amG.gain.value=v.gain*0.4;
    amLfo.connect(amG);amG.connect(g.gain);
    o.connect(g);g.connect(sat);
    o.start();amLfo.start();
    oscs.push(o,amLfo);gains.push(g);
  });
  // Gentle pitch drift — human imperfection
  const driftLFO=ctx.createOscillator();driftLFO.type='sine';driftLFO.frequency.value=0.03;
  const driftG=ctx.createGain();driftG.gain.value=2;// ±2 cents — subtle
  driftLFO.connect(driftG);
  oscs.filter(o=>o.type==='triangle').forEach(o=>driftG.connect(o.detune));
  driftLFO.start();
  oscs.push(driftLFO);

  // Page turn: pink noise shaped by 20 Hz AM (papery flutter), bandpass 1200–5000 Hz
  let alive=true;
  function pageTurn(){
    if(!alive)return;
    const t=ctx.currentTime;
    const pl=Math.floor(ctx.sampleRate*0.18);
    const pb=ctx.createBuffer(1,pl,ctx.sampleRate),pd2=pb.getChannelData(0);
    // Pink noise modulated by 20 Hz sine for paper flutter texture
    const pinkD=getPinkNoise(ctx).getChannelData(0);
    for(let i=0;i<pl;i++){
      const env=Math.sin(Math.PI*i/pl); // smooth rise-fall
      pd2[i]=pinkD[i%pinkD.length]*Math.sin(2*Math.PI*20*i/ctx.sampleRate)*env;
    }
    const ps=ctx.createBufferSource();ps.buffer=pb;
    const php=ctx.createBiquadFilter();php.type='highpass';php.frequency.value=1200;
    const plp=ctx.createBiquadFilter();plp.type='lowpass';plp.frequency.value=5000;
    const pg=ctx.createGain();pg.gain.value=0.03;
    ps.connect(php);php.connect(plp);plp.connect(pg);pg.connect(out);ps.start(t);
    setTimeout(pageTurn,14000+Math.random()*18000);
  }
  pageTurn();
  return{stop(){alive=false;oscs.forEach(o=>{try{o.stop();}catch(e){}});},
    scaleUp(f,t,d){gains.forEach(g=>{const cur=g.gain.value;g.gain.setTargetAtTime(cur*f,t,d*0.3);});}};
}

function synthLapis(ctx,out){
  // Liturgical stone floor: deep room resonance (near 110 Hz "holy frequency")
  // with occasional rubato footstep pairs — synthesized impacts, not noise bursts
  // Organ pedal: stacked harmonics instead of single sine
  const harmonics=[80,160,240,320];
  const hAmps=[0.028,0.018,0.01,0.005];
  const organLP=ctx.createBiquadFilter();organLP.type='lowpass';organLP.frequency.value=400;organLP.Q.value=0.5;
  const organG=ctx.createGain();organG.gain.value=0;
  organG.gain.linearRampToValueAtTime(1,ctx.currentTime+2); // 2s fade-in
  const organOscs=harmonics.map((hz,i)=>{
    const o=ctx.createOscillator();o.type='sine';o.frequency.value=hz;
    const g=ctx.createGain();g.gain.value=hAmps[i];
    o.connect(g);g.connect(organLP);o.start();return o;
  });
  organLP.connect(organG);organG.connect(out);
  // Breathing LFO on organ
  const olfo=ctx.createOscillator();olfo.type='sine';olfo.frequency.value=0.03;
  const og=ctx.createGain();og.gain.value=0.006;
  olfo.connect(og);og.connect(organG.gain);olfo.start();

  let alive=true;
  // Footstep: synthesized impact using sine with pitch envelope (not a noise burst)
  // Floor thud: sine 120→60 Hz in 80ms (resonant stone impact)
  // Heel click: higher sine 400→200 Hz, shorter, delayed 15ms
  function step(){
    if(!alive)return;
    const t=ctx.currentTime;
    // Distant footsteps: soft shoe on stone, heard from across the cathedral
    // Random step count (2-4 steps per event, like someone crossing the nave)
    const steps=2+Math.floor(Math.random()*3);
    const pace=0.42+Math.random()*0.12;// slight pace variation
    for(let s=0;s<steps;s++){
      const off=s*pace;
      // Soft sole contact: low thud, very quiet (distance attenuates)
      const o1=ctx.createOscillator();o1.type='sine';
      o1.frequency.setValueAtTime(90,t+off);
      o1.frequency.exponentialRampToValueAtTime(45,t+off+0.06);
      const e1=ctx.createGain();
      e1.gain.setValueAtTime(0,t+off);e1.gain.linearRampToValueAtTime(0.035,t+off+0.004);
      e1.gain.exponentialRampToValueAtTime(0.0001,t+off+0.18);
      o1.connect(e1);e1.connect(out);o1.start(t+off);o1.stop(t+off+0.22);
      // Pat/scuff: filtered noise, very brief, the leather-on-stone texture
      const bl=Math.floor(ctx.sampleRate*0.025);
      const buf=ctx.createBuffer(1,bl,ctx.sampleRate);const d=buf.getChannelData(0);
      for(let i=0;i<bl;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/bl,3);
      const src=ctx.createBufferSource();src.buffer=buf;
      const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=1800+Math.random()*600;bp.Q.value=1.5;
      const e2=ctx.createGain();e2.gain.setValueAtTime(0.018,t+off+0.008);
      e2.gain.exponentialRampToValueAtTime(0.0001,t+off+0.04);
      src.connect(bp);bp.connect(e2);e2.connect(out);src.start(t+off+0.008);
    }
    // Long irregular intervals — someone walking occasionally, not metronomic
    setTimeout(step,12000+Math.random()*18000);
  }
  step();
  return{stop(){alive=false;try{organOscs.forEach(o=>o.stop());olfo.stop();}catch(e){}},
    scaleUp(f,t,d){organG.gain.setTargetAtTime(1.0*f,t,d*0.3);}};
}

function synthAqua(ctx,out){
  // Holy water font: sine-chirp drips with natural Poisson timing,
  // aspergillum sprinkle burst on placement and at long intervals
  let alive=true;
  // Continuous water ripple
  const wns=ctx.createBufferSource();wns.buffer=getPinkNoise(ctx);wns.loop=true;
  const wbp=ctx.createBiquadFilter();wbp.type='bandpass';wbp.frequency.value=400;wbp.Q.value=1.5;
  const wlfo=ctx.createOscillator();wlfo.type='sine';wlfo.frequency.value=0.1;
  const wlg=ctx.createGain();wlg.gain.value=60;
  wlfo.connect(wlg);wlg.connect(wbp.frequency);wlfo.start();
  const wg=ctx.createGain();wg.gain.value=0.015;
  wns.connect(wbp);wbp.connect(wg);wg.connect(out);wns.start();
  function singleDrip(t,gain){
    // Drip: descending sine chirp (liquid bubble, not noise)
    const dripHz=500+Math.random()*200,hz1=140+Math.random()*60;
    const hz0=dripHz;
    const o=ctx.createOscillator();o.type='sine';
    o.frequency.setValueAtTime(hz0,t);o.frequency.exponentialRampToValueAtTime(hz1,t+0.15);
    const e=ctx.createGain();
    e.gain.setValueAtTime(0,t);e.gain.linearRampToValueAtTime(gain,t+0.002);
    e.gain.exponentialRampToValueAtTime(0.0001,t+0.2);
    // Subtle second harmonic for liquid body
    const o2=ctx.createOscillator();o2.type='sine';
    o2.frequency.setValueAtTime(hz0*2.1,t);o2.frequency.exponentialRampToValueAtTime(hz1*1.6,t+0.12);
    const e2=ctx.createGain();
    e2.gain.setValueAtTime(0,t);e2.gain.linearRampToValueAtTime(gain*0.3,t+0.003);
    e2.gain.exponentialRampToValueAtTime(0.0001,t+0.12);
    o.connect(e);e.connect(out);o.start(t);o.stop(t+0.25);
    o2.connect(e2);e2.connect(out);o2.start(t);o2.stop(t+0.15);
    // Resonant body — ceramic vessel quality
    const rns=ctx.createBufferSource();rns.buffer=getPinkNoise(ctx);rns.loop=false;
    const rbp=ctx.createBiquadFilter();rbp.type='bandpass';rbp.frequency.value=dripHz;rbp.Q.value=12;
    const rg=ctx.createGain();rg.gain.setValueAtTime(0.006,t);rg.gain.exponentialRampToValueAtTime(0.0001,t+0.06);
    rns.connect(rbp);rbp.connect(rg);rg.connect(out);rns.start(t);rns.stop(t+0.07);
  }
  // Regular drips with Poisson-distributed intervals
  function drip(){
    if(!alive)return;
    singleDrip(ctx.currentTime,0.03);
    setTimeout(drip,4000+Math.random()*8000);
  }
  // Aspergillum: burst of 6–8 drips clustered in ~1s, then 2–3 slow trailing drips
  function sprinkle(){
    if(!alive)return;
    const t=ctx.currentTime;
    const n=6+Math.floor(Math.random()*3);
    for(let i=0;i<n;i++){
      singleDrip(t+i*0.12+Math.random()*0.06,0.02);
    }
    // Trailing drips
    for(let i=0;i<3;i++){
      singleDrip(t+n*0.12+0.8+i*0.5+Math.random()*0.3,0.015);
    }
    setTimeout(sprinkle,70000+Math.random()*50000);
  }
  drip();
  setTimeout(()=>{if(alive)sprinkle();},2000); // initial sprinkle shortly after placement
  return{stop(){alive=false;try{wns.stop();wlfo.stop();}catch(e){}}};
}

function synthCampana(ctx,out,gainMult){
  // Tower bell: proper additive synthesis with inharmonic partials,
  // distance-simulated LP sweep (transient bright → sustained warm),
  // very long decay (10s). Sparse triggering: 40–90s intervals.
  const t=ctx.currentTime,hz=130.8,gm=gainMult||1;
  const partials=[ // [ratio, amplitude, decayRate] — higher partials decay faster
    [0.5,  0.08, 0.45], // hum tone (2 octaves below nominal)
    [1.0,  0.28, 1.0],  // prime/strike tone
    [1.2,  0.14, 1.6],  // minor third
    [1.5,  0.18, 1.3],  // fifth
    [2.0,  0.10, 2.2],  // nominal (octave)
    [2.47, 0.05, 3.0],  // superquint
    [3.0,  0.025,4.0],  // octave nominal
  ];
  partials.forEach(([r,amp,dk])=>{
    const o=ctx.createOscillator();o.type='sine';o.frequency.value=hz*r;
    // Distance LP: starts at 2kHz, opens to 4kHz over 2s (transient arrives filtered)
    const lp=ctx.createBiquadFilter();lp.type='lowpass';
    lp.frequency.setValueAtTime(500,t);lp.frequency.exponentialRampToValueAtTime(3000,t+3);
    const e=ctx.createGain();
    e.gain.setValueAtTime(0,t);
    e.gain.linearRampToValueAtTime(gm*0.04*amp,t+0.008);
    e.gain.exponentialRampToValueAtTime(0.0001,t+10/dk);
    o.connect(lp);lp.connect(e);e.connect(out);o.start(t);o.stop(t+10/dk+0.3);
  });
  let alive=true,bellTimer;
  function scheduleBell(){bellTimer=setTimeout(()=>{if(alive){synthCampana(ctx,out,gm);scheduleBell();}},40000+Math.random()*50000);}
  scheduleBell();
  return{stop(){alive=false;clearTimeout(bellTimer);}};
}

  votiveStates[id]=!votiveStates[id];
