  if(votiveStates[id]){
    const vd=VOTIVES.find(v=>v.id===id);
    votiveVoices[id]=vd.synthFn(AC.ctx,ROOM.masterGain);
    if(el)el.classList.add('active');
  }else{
    if(votiveVoices[id]&&votiveVoices[id].stop)votiveVoices[id].stop();
    delete votiveVoices[id];
    if(el)el.classList.remove('active');
  }
  checkAllVotives();
}

function checkAllVotives(){
  if(Object.values(votiveStates).filter(Boolean).length===8)triggerLocusSanctus();
}

let locusFadeTimer=null;
function triggerLocusSanctus(){
  if(!AC.ctx)return;
  const t=AC.ctx.currentTime;
  const lbl=document.getElementById('locus-label');
  if(lbl){lbl.textContent='Locus sanctus confirmatur';lbl.classList.add('revealed');}
  ROOM.busWet.gain.setTargetAtTime(1.15,t,1.0);
  synthCampana(AC.ctx,ROOM.masterGain,1.8);
  // Sawtooth choir — formant-filtered, building over 2s then sustaining
  [146.83,146.83,220.00,220.00,293.66,293.66,440.00,440.00].forEach((freq,i)=>{
    const o=AC.ctx.createOscillator();o.type='sawtooth';o.frequency.value=freq;o.detune.value=(Math.random()-.5)*10;
    const f=AC.ctx.createBiquadFilter();f.type='bandpass';f.frequency.value=[300,900,2200][i%3];f.Q.value=10;
    const e=AC.ctx.createGain();e.gain.setValueAtTime(0,t+i*.08);e.gain.linearRampToValueAtTime(.038,t+i*.08+2);
    e.gain.setTargetAtTime(.012,t+8,1.5);e.gain.exponentialRampToValueAtTime(.0001,t+12);
    o.connect(f);f.connect(e);e.connect(ROOM.masterGain);o.start(t+i*.08);o.stop(t+12.5);
  });
  ['incensum','cereus','lilium','lapis'].forEach(id=>{
    if(votiveVoices[id]&&votiveVoices[id].scaleUp)votiveVoices[id].scaleUp(1.3,t,4.0);
  });
  // 3-minute decay: saint song fades over 180 seconds then sequencer stops
  if(locusFadeTimer)clearTimeout(locusFadeTimer);
  AC.master.gain.setTargetAtTime(0.64,t,0.5);// reset to full first
  AC.master.gain.setTargetAtTime(0.001,t+5,55);// exponential decay over ~3 min (tau=55s → ~99% gone at 5*55=275s)
  locusFadeTimer=setTimeout(()=>{
    // After 3 minutes, stop the sequencer gracefully
    if(timerID){clearTimeout(timerID);timerID=null;}
    const lbl2=document.getElementById('locus-label');
    if(lbl2)lbl2.textContent='Silentium sanctum';
  },180000);
}

const LIMB_STATE={'left-arm':{angle:0,vel:0},'right-arm':{angle:0,vel:0}};
const SPRING_K=0.15,SPRING_DAMP=0.7;
function nudgeLimbs(){const n=Object.keys(VOICES).length;if(n===0)return;const force=Math.min(n*0.4,2.5);LIMB_STATE['left-arm'].vel+=(Math.random()-0.5)*force;LIMB_STATE['right-arm'].vel+=(Math.random()-0.5)*force;}
function rippleLoop(){requestAnimationFrame(rippleLoop);for(const[limb,st]of Object.entries(LIMB_STATE)){const acc=-SPRING_K*st.angle;st.vel=(st.vel+acc)*SPRING_DAMP;st.angle+=st.vel;const el=document.querySelector('[data-limb="'+limb+'"]');if(el)el.setAttribute('transform','rotate('+st.angle.toFixed(2)+' '+(limb==='left-arm'?'95':'205')+' 108)');}}

// ══════ RELIC PREVIEW ══════
function playRelicPreview(relic,saint){
  if(!AC.ctx)return;
  const synthFn=SYNTH_FNS[saint.id];
  if(!synthFn){
    // Saints without synth functions get a soft confirmation click
    const c=AC.ctx,t=c.currentTime;
    const o=c.createOscillator();o.type='sine';o.frequency.value=saint.freq*2;
    const e=c.createGain();e.gain.setValueAtTime(0.1,t);e.gain.exponentialRampToValueAtTime(0.001,t+0.12);
    o.connect(e);e.connect(AC.master);o.start(t);o.stop(t+0.15);
    return;
  }
  // Build a temporary voice and trigger it with a representative pattern step
  const c=AC.ctx,t=c.currentTime;
  const vg=c.createGain();vg.gain.value=0.7;
  vg.connect(AC.master);
  if(saint.id!=='bartholomew')vg.connect(AC.reverbSend);
  const tempVoice={output:vg,pattern:null,synthFn,saint,relic};
  const hz=saint.freq;
  const dur=STEP_DUR*0.85;
  synthFn(c,tempVoice,t,dur,hz,0.7,false,false,0);
  // Fade out the gain node after 2 seconds to clean up
  vg.gain.setTargetAtTime(0,t+1.5,0.3);
  setTimeout(()=>{try{vg.disconnect();}catch(e){}},3000);
}

// ══════ DRAG & DROP ══════
function startDrag(ev,relic,saint,el){
  ev.preventDefault();if(!AC.ctx){initAudio();startSequencer();}
  dragging={relic,saint,el,fromSlot:null};
  el.classList.add('dragging');
  const gh=document.getElementById('drag-ghost');
  const dsi=SAINTS.indexOf(saint),dri=saint.relics.indexOf(relic);
  gh.innerHTML='<img src="assets/'+RELIC_IMGS[(dsi+dri)%RELIC_IMGS.length]+'" style="width:100%;height:100%;object-fit:contain;filter:brightness(1.3) drop-shadow(0 0 8px '+saint.color+')">';
  gh.classList.add('active');
  moveGhost(ev.clientX,ev.clientY);el.style.opacity='0.3';
  // Capture pointer so drag crosses container boundaries on touch
  if(ev.target.setPointerCapture)try{ev.target.setPointerCapture(ev.pointerId);}catch(e){}
  // Build audition voice
  auditionVoice=buildVoice(relic,saint,AC.auditionGain);
  resetIdleTimer();
  document.addEventListener('pointermove',onDragMove);document.addEventListener('pointerup',onDragEnd);
}
let slotDragStart=null;
function startSlotDrag(ev,slotIdx){
  ev.preventDefault();const s=slots[slotIdx];if(!s)return;
  slotDragStart={x:ev.clientX,y:ev.clientY,idx:slotIdx,moved:false};
  dragging={relic:s.relic,saint:s.saint,el:null,fromSlot:slotIdx};dragFromSlot=slotIdx;
  if(ev.target.setPointerCapture)try{ev.target.setPointerCapture(ev.pointerId);}catch(e){}
  const gh=document.getElementById('drag-ghost');
  const dsi2=SAINTS.indexOf(s.saint),dri2=s.saint.relics.indexOf(s.relic);
  gh.innerHTML='<img src="assets/'+RELIC_IMGS[(dsi2+dri2)%RELIC_IMGS.length]+'" style="width:100%;height:100%;object-fit:contain;filter:brightness(1.3) drop-shadow(0 0 8px '+s.saint.color+')">';
  gh.classList.add('active');
  moveGhost(ev.clientX,ev.clientY);resetIdleTimer();
  document.addEventListener('pointermove',onDragMove);document.addEventListener('pointerup',onDragEnd);
}
function moveGhost(x,y){const gh=document.getElementById('drag-ghost');const off=gh.offsetWidth/2||26;gh.style.left=(x-off)+'px';gh.style.top=(y-off)+'px';}

function onDragMove(ev){
  ev.preventDefault();moveGhost(ev.clientX,ev.clientY);
  if(slotDragStart){const dx=ev.clientX-slotDragStart.x,dy=ev.clientY-slotDragStart.y;if(dx*dx+dy*dy>64)slotDragStart.moved=true;}
  // Proximity audition — smooth fade based on distance to nearest slot
  if(auditionVoice&&AC.auditionGain){
    let minDist=Infinity;
    document.querySelectorAll('.slot').forEach(sl=>{
      const r=sl.getBoundingClientRect();
      const cx=r.left+r.width/2,cy=r.top+r.height/2;
      const d=Math.sqrt((ev.clientX-cx)**2+(ev.clientY-cy)**2);
      if(d<minDist)minDist=d;
      sl.classList.toggle('dragover',d<40);
    });
    const gain=minDist<50?0.3:minDist>200?0:0.3*(1-(minDist-50)/150);
    // Only update if gain changed meaningfully — prevents jitter
    const cur=AC.auditionGain.gain.value;
    if(Math.abs(gain-cur)>0.02){
      AC.auditionGain.gain.cancelScheduledValues(AC.ctx.currentTime);
      AC.auditionGain.gain.setTargetAtTime(gain,AC.ctx.currentTime,0.15);// slower smoothing
    }
  } else {
    document.querySelectorAll('.slot').forEach(sl=>{
      const r=sl.getBoundingClientRect();
      const inside=ev.clientX>=r.left&&ev.clientX<=r.right&&ev.clientY>=r.top&&ev.clientY<=r.bottom;
      sl.classList.toggle('dragover',inside);
    });
  }
  // Illuminate vestment zone when relic hovers near — the fabric whispers
  document.querySelectorAll('.illum-zone').forEach(z=>{
    const zi=parseInt(z.dataset.zone);
    const isNear=!!document.querySelector('.slot.dragover[data-index="'+zi+'"]');
    // Only show hover glow on empty (non-active) zones
    z.classList.toggle('hover',isNear&&!z.classList.contains('active'));
  });
}

function onDragEnd(ev){
  ev.preventDefault();
  if(ev.target.releasePointerCapture)try{ev.target.releasePointerCapture(ev.pointerId);}catch(e){}
  document.removeEventListener('pointermove',onDragMove);document.removeEventListener('pointerup',onDragEnd);
  document.getElementById('drag-ghost').classList.remove('active');
  document.querySelectorAll('.slot.dragover').forEach(s=>s.classList.remove('dragover'));
  document.querySelectorAll('.illum-zone.hover').forEach(z=>z.classList.remove('hover'));
  document.querySelectorAll('.relic-cell.dragging').forEach(c=>c.classList.remove('dragging'));
  // Kill audition
  if(AC.auditionGain)AC.auditionGain.gain.setTargetAtTime(0,AC.ctx.currentTime,0.03);
  auditionVoice=null;

  if(!dragging){slotDragStart=null;return;}
  if(dragging.el)dragging.el.style.opacity='';
  // Click-to-remove: if pointer barely moved and came from a filled slot, remove it
  if(slotDragStart&&!slotDragStart.moved&&dragging.fromSlot!==null){
    const idx=dragging.fromSlot;
    dragging=null;dragFromSlot=null;slotDragStart=null;
    const sl=document.querySelector('.slot[data-index="'+idx+'"]');
    if(sl){sl.classList.add('removing');setTimeout(()=>{removeFromSlot(idx);},300);}
    resetIdleTimer();return;
  }
  slotDragStart=null;
  let target=null;
  document.querySelectorAll('.slot').forEach(sl=>{
    const r=sl.getBoundingClientRect();
    if(ev.clientX>=r.left&&ev.clientX<=r.right&&ev.clientY>=r.top&&ev.clientY<=r.bottom)target=+sl.dataset.index;
  });
  const fromSlot=dragging.fromSlot;
  if(target!==null){
    if(fromSlot!==null){
      if(target!==fromSlot){
        const temp=slots[target];
        if(VOICES[fromSlot]){VOICES[fromSlot].output.gain.setTargetAtTime(0,AC.ctx.currentTime,0.02);setTimeout(()=>{try{VOICES[fromSlot].output.disconnect();}catch(e){}},200);delete VOICES[fromSlot];}
        slots[fromSlot]=null;
        if(temp){if(VOICES[target]){VOICES[target].output.gain.setTargetAtTime(0,AC.ctx.currentTime,0.02);setTimeout(()=>{try{VOICES[target].output.disconnect();}catch(e){}},200);delete VOICES[target];}slots[target]=null;placeRelic(fromSlot,temp.relic,temp.saint,true);}
        placeRelic(target,dragging.relic,dragging.saint,true);
        renderSlots();renderRelicGrid();renderAuth();
      }
    } else {
      if(slots[target])removeFromSlot(target,true);
      placeRelic(target,dragging.relic,dragging.saint);
    }
  } else if(fromSlot===null){playRelicPreview(dragging.relic,dragging.saint);}
  dragging=null;dragFromSlot=null;resetIdleTimer();
}

// ══════ PLACE / REMOVE ══════
function placeRelic(idx,relic,saint,silent){
  if(!AC.ctx)initAudio();if(!timerID)startSequencer();
  const voice=buildVoice(relic,saint,AC.master);
  slots[idx]={relic,saint,voice};VOICES[idx]=voice;updateDensity();
  if(!silent){renderSlots();renderRelicGrid();renderAuth();}
  setTimeout(()=>{const sl=document.querySelector('.slot[data-index="'+idx+'"]');if(sl){sl.classList.add('burst');setTimeout(()=>sl.classList.remove('burst'),500);}},50);
  resetIdleTimer();
}
function removeFromSlot(idx,silent){
  const s=slots[idx];if(!s)return;
  if(s.voice&&s.voice.output){
    s.voice.output.gain.setTargetAtTime(0,AC.ctx.currentTime,silent?0.02:0.05);
    // Cleanup leaky nodes
    if(s.voice.output._screwLfo)try{s.voice.output._screwLfo.stop();}catch(e){}
    if(s.voice._acidOsc)try{s.voice._acidOsc.stop();}catch(e){}
    setTimeout(()=>{try{s.voice.output.disconnect();}catch(e){}},250);
  }
  delete VOICES[idx];slots[idx]=null;updateDensity();
  if(!silent){renderSlots();renderRelicGrid();renderAuth();}
  if(Object.keys(VOICES).length===0&&timerID){clearTimeout(timerID);timerID=null;}resetIdleTimer();
}

// ══════ VISUALIZER ══════
function drawViz(){
  const cv=document.getElementById('visualizer'),cx=cv.getContext('2d');
  cv.width=cv.offsetWidth*2;cv.height=cv.offsetHeight*2;cx.scale(2,2);
  let sci=0;
  (function loop(){requestAnimationFrame(loop);if(!AC.analyser)return;
  const w=cv.offsetWidth,h=cv.offsetHeight;cx.clearRect(0,0,w,h);
  const bl=AC.analyser.frequencyBinCount,data=new Uint8Array(bl);AC.analyser.getByteFrequencyData(data);
  const bw=w/bl;const as=[...new Set(slots.filter(Boolean).map(s=>s.saint))];
  const vc=as.length>0?as[Math.floor(sci/60)%as.length].color:'rgba(255,69,0,1)';sci++;
  for(let i=0;i<bl;i++){const val=data[i]/255,bh=val*h*0.85;
  const rr=parseInt(vc.slice(1,3),16)||255,gg=parseInt(vc.slice(3,5),16)||69,bb=parseInt(vc.slice(5,7),16)||0;
  cx.fillStyle='rgba('+rr+','+gg+','+bb+','+(val*0.4)+')';cx.fillRect(i*bw,h-bh,Math.max(bw-1,1),bh);}})();
}

// ══════ INIT ══════
function beginApp(){
  // Init audio on user gesture (required for iOS/mobile)
  if(!AC.ctx){initAudio();startSequencer();}
  else if(AC.ctx.state==='suspended')AC.ctx.resume();
  document.getElementById('landing').classList.add('hidden');
  document.getElementById('app').classList.add('active');
  selectSaint(0);renderSlots();renderAuth();drawViz();rippleLoop();resetIdleTimer();
}
document.getElementById('begin-btn').addEventListener('pointerdown',beginApp);
document.getElementById('begin-btn').addEventListener('click',beginApp);
document.querySelectorAll('.votive').forEach(el=>{
  el.addEventListener('click',()=>toggleVotive(el.dataset.id));
});

// ══════ MIDI ══════
// Notes 36-44 (C2–G#2) → toggle relic in slot 0–8
// Notes 48-57 (C3–A3)  → select saint 0–9
// Program Change 0–9    → select saint
// Velocity scales voice gain; velocity 0 = note-off
(function initMIDI(){
  if(!navigator.requestMIDIAccess)return;
  navigator.requestMIDIAccess({sysex:false}).then(midi=>{
    function bindInputs(){
      midi.inputs.forEach(input=>{input.onmidimessage=onMIDI;});
    }
    bindInputs();
    midi.onstatechange=bindInputs;
  }).catch(()=>{});

  function onMIDI(e){
    const d=e.data;if(!d||d.length<2)return;
    const cmd=d[0]&0xF0,note=d[1],vel=d.length>2?d[2]:0;

    // Note On (0x90) with vel > 0
    if(cmd===0x90&&vel>0){
      // Slot trigger: notes 36–44
      if(note>=36&&note<=44){
        const idx=note-36;
        if(slots[idx]){
          removeFromSlot(idx);
        }else{
          const saint=SAINTS[currentSaintIdx];
          const placed=slots.filter(Boolean).map(s=>s.relic.id);
          const relic=saint.relics.find(r=>!placed.includes(r.id));
          if(relic){
            placeRelic(idx,relic,saint);
            // Scale gain by velocity (0.3–1.0)
            const v=slots[idx]&&slots[idx].voice;
            if(v&&v.output){v.output.gain.setTargetAtTime(0.3+0.7*(vel/127),AC.ctx.currentTime,0.02);}
          }
        }
        return;
      }
      // Saint select: notes 48–57
      if(note>=48&&note<=57){
        const si=note-48;
        if(si<SAINTS.length)selectSaint(si);
        return;
      }
    }

    // Note Off (0x80) or Note On with vel 0 → remove from slot
    if(cmd===0x80||(cmd===0x90&&vel===0)){
      if(note>=36&&note<=44){
        const idx=note-36;
        if(slots[idx])removeFromSlot(idx);
      }
      return;
    }

    // Program Change (0xC0) → select saint
    if(cmd===0xC0){
      if(note<SAINTS.length)selectSaint(note);
    }
  }
})();
</script></body></html>
